<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Sombras de Eldoria - Tower Defense</title>
<style>
  html, body { margin:0; padding:0; background:#0b0d0a; height:100%; overflow:hidden;
    font-family: 'Trebuchet MS', sans-serif; color:#d8d2bf; }
  #game { width:100vw; height:100vh; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<div id="game"></div>
<script>
// =============== CONSTANTES ===============
const W = 1280, H = 720;

const TOWER_TYPES = {
  archer: {
    name: "Arqueiro Élfico", cost: 50, range: 170, damage: 18, fireRate: 500,
    color: 0x4a8f5b, projColor: 0xe8d680,
    desc: "Tiro rápido, dano leve",
  },
  dwarf: {
    name: "Anão de Pedra", cost: 100, range: 130, damage: 55, fireRate: 1100,
    color: 0x8a6a44, projColor: 0xb8b0a0,
    desc: "Lento, dano pesado",
  },
  mage: {
    name: "Mago das Runas", cost: 150, range: 200, damage: 28, fireRate: 900,
    color: 0x7a4abf, projColor: 0xc89cff, splash: 60,
    desc: "Dano em área mágico",
  },
};

const ENEMY_TYPES = {
  orc:    { name: "Orc",    color: 0x7a3a2a, size: 26, baseHp: 50,  baseSpd: 70,  reward: 8,  spark: 0xff8866 },
  troll:  { name: "Troll",  color: 0x4a6a3a, size: 34, baseHp: 180, baseSpd: 45,  reward: 18, spark: 0x88ff88 },
  wraith: { name: "Wraith", color: 0x6a4a8a, size: 24, baseHp: 60,  baseSpd: 110, reward: 14, spark: 0xc89cff, alpha: 0.7 },
};

// === MAPAS ===
const STAGES = [
  {
    id: 0, name: "Floresta Sombria", difficulty: 1,
    palette: { bg: 0x14181a, moss: 0x2a3a26, mossL: 0x3d5236, path: 0x3a2e22, pathEdge: 0x241c14, fog: 0x0a1a0a, mtn: 0x1a2a1a },
    speedMul: 1.0,
    path: [
      {x:-30,y:120},{x:240,y:120},{x:240,y:320},{x:540,y:320},{x:540,y:140},
      {x:840,y:140},{x:840,y:500},{x:380,y:500},{x:380,y:620},{x:1100,y:620},
      {x:1100,y:380},{x:1220,y:380},
    ],
    slots: [
      {x:140,y:220},{x:340,y:220},{x:440,y:240},{x:640,y:220},{x:740,y:240},
      {x:940,y:240},{x:940,y:440},{x:740,y:420},{x:480,y:420},{x:480,y:600},
      {x:740,y:580},{x:1020,y:540},{x:1020,y:320},
    ],
    waveMix: ['orc','orc','orc','orc','troll','orc','orc','wraith','troll','orc'],
  },
  {
    id: 1, name: "Ruínas de Pedra", difficulty: 2,
    palette: { bg: 0x101418, moss: 0x202830, mossL: 0x303a44, path: 0x3a3a40, pathEdge: 0x1a1a20, fog: 0x0a1218, mtn: 0x1a2230 },
    speedMul: 1.2,
    path: [
      {x:-30,y:360},{x:160,y:360},{x:160,y:140},{x:360,y:140},{x:360,y:520},
      {x:560,y:520},{x:560,y:140},{x:760,y:140},{x:760,y:520},{x:960,y:520},
      {x:960,y:140},{x:1160,y:140},{x:1160,y:400},{x:1310,y:400},
    ],
    slots: [
      {x:80,y:240},{x:260,y:240},{x:260,y:440},{x:460,y:240},{x:460,y:440},
      {x:660,y:240},{x:660,y:440},{x:860,y:240},{x:860,y:440},{x:1060,y:240},
      {x:1060,y:440},{x:1220,y:560},
    ],
    waveMix: ['orc','orc','troll','orc','wraith','troll','orc','wraith','troll','wraith'],
  },
  {
    id: 2, name: "Portão das Trevas", difficulty: 3,
    palette: { bg: 0x180a14, moss: 0x2a1428, mossL: 0x3a1a34, path: 0x3a1a2a, pathEdge: 0x1a0814, fog: 0x180810, mtn: 0x281024 },
    speedMul: 1.1,
    path: [
      {x:-30,y:360},{x:200,y:360},{x:200,y:200},{x:1080,y:200},{x:1080,y:560},
      {x:340,y:560},{x:340,y:340},{x:900,y:340},{x:900,y:440},{x:540,y:440},{x:540,y:380},{x:740,y:380},
    ],
    slots: [
      {x:140,y:280},{x:300,y:130},{x:600,y:130},{x:900,y:130},{x:1180,y:380},
      {x:980,y:620},{x:600,y:620},{x:240,y:480},{x:480,y:280},{x:780,y:280},
      {x:1020,y:380},{x:660,y:480},
    ],
    waveMix: ['wraith','wraith','orc','wraith','troll','wraith','wraith','troll','wraith','wraith'],
  },
];

function buildWaves(stage) {
  const waves = [];
  for (let i=0; i<10; i++) {
    const type = stage.waveMix[i];
    const t = ENEMY_TYPES[type];
    const tier = i + 1;
    const count = Math.round(6 + tier*1.6);
    const hp = Math.round(t.baseHp * (1 + tier*0.25) * (1 + stage.difficulty*0.1));
    const speed = Math.round(t.baseSpd * stage.speedMul * (1 + tier*0.02));
    waves.push({ count, hp, speed, interval: Math.max(350, 800 - tier*40), type });
  }
  return waves;
}

// =================== BOOT ===================
class BootScene extends Phaser.Scene {
  constructor() { super('BootScene'); }
  create() { this.scene.start('StageSelectScene'); }
}

// =================== STAGE SELECT ===================
class StageSelectScene extends Phaser.Scene {
  constructor() { super('StageSelectScene'); }
  create() {
    const g = this.add.graphics();
    g.fillStyle(0x0b0d0a,1).fillRect(0,0,W,H);
    for (let i=0;i<200;i++){
      g.fillStyle(0x1a1a22, Phaser.Math.FloatBetween(0.1,0.3));
      g.fillCircle(Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),Phaser.Math.Between(10,60));
    }
    this.add.text(W/2, 60, "SOMBRAS DE ELDORIA", {fontSize:'52px', color:'#c8a8ff', fontStyle:'bold'}).setOrigin(0.5);
    this.add.text(W/2, 120, "Escolha seu estágio", {fontSize:'22px', color:'#d8d2bf', fontStyle:'italic'}).setOrigin(0.5);

    const cardW = 360, cardH = 420, gap = 40;
    const totalW = STAGES.length*cardW + (STAGES.length-1)*gap;
    const startX = (W - totalW)/2;

    STAGES.forEach((s, i) => {
      const x = startX + i*(cardW+gap);
      const y = 170;
      const c = this.add.container(x + cardW/2, y + cardH/2);
      const bg = this.add.rectangle(0,0,cardW,cardH, s.palette.bg).setStrokeStyle(3, 0x6b5a36);
      c.add(bg);

      // mini preview
      const prev = this.add.graphics();
      prev.fillStyle(s.palette.moss, 1).fillRect(-cardW/2+16, -cardH/2+50, cardW-32, 200);
      // path
      prev.lineStyle(10, s.palette.pathEdge, 1);
      prev.beginPath();
      const px = (p) => -cardW/2+16 + (p.x+30)/1340 * (cardW-32);
      const py = (p) => -cardH/2+50 + (p.y)/720 * 200;
      prev.moveTo(px(s.path[0]), py(s.path[0]));
      for (let k=1;k<s.path.length;k++) prev.lineTo(px(s.path[k]), py(s.path[k]));
      prev.strokePath();
      prev.lineStyle(6, s.palette.path, 1);
      prev.beginPath();
      prev.moveTo(px(s.path[0]), py(s.path[0]));
      for (let k=1;k<s.path.length;k++) prev.lineTo(px(s.path[k]), py(s.path[k]));
      prev.strokePath();
      c.add(prev);

      const title = this.add.text(0, -cardH/2+20, s.name, {fontSize:'24px', color:'#e8d8ff', fontStyle:'bold'}).setOrigin(0.5,0);
      const stars = '★'.repeat(s.difficulty) + '☆'.repeat(3-s.difficulty);
      const dif = this.add.text(0, -cardH/2+270, stars, {fontSize:'30px', color:'#ffcc44'}).setOrigin(0.5,0);
      const desc = this.add.text(0, -cardH/2+320, ['Curvas suaves\nIdeal para começar','Zigue-zague agressivo\nInimigos +20% velocidade','Espiral caótica\nWraiths em maioria'][i],
        {fontSize:'14px', color:'#d8d2bf', align:'center'}).setOrigin(0.5,0);
      const btn = this.add.rectangle(0, cardH/2-40, 200, 50, 0x2d5a2a).setStrokeStyle(2, 0x6cbf4c);
      const btnT = this.add.text(0, cardH/2-40, "Jogar", {fontSize:'22px', color:'#e8ffe0', fontStyle:'bold'}).setOrigin(0.5);
      c.add([title, dif, desc, btn, btnT]);

      btn.setInteractive({useHandCursor:true});
      btn.on('pointerover', ()=> btn.setFillStyle(0x3d7a3a));
      btn.on('pointerout', ()=> btn.setFillStyle(0x2d5a2a));
      btn.on('pointerdown', () => {
        this.scene.stop('UIScene');
        this.scene.stop('GameScene');
        this.scene.stop('GameOverScene');
        this.scene.start('GameScene', { stageId: s.id });
      });
    });
  }
}

// =================== GAME ===================
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  init(data) {
    this.stage = STAGES[data.stageId || 0];
    this.PATH = this.stage.path;
    this.SLOTS = this.stage.slots;
    this.WAVES = buildWaves(this.stage);
  }

  create() {
    this.spawnTimer = null;
    this.slots = [];
    this.activeEnemies = [];
    this.activeProjectiles = [];
    this.towers = [];
    this.enemies = null;
    this.projectiles = null;
    this.towerGroup = null;
    this.slotGroup = null;
    this.gameOver = false;
    this.waveInProgress = false;
    this.currentWave = 0;
    this.baseHP = 20;
    this.gold = 150;
    this.state = {
      gold: this.gold, hp: this.baseHP, maxHp: 20,
      wave: this.currentWave, waveActive: this.waveInProgress, enemiesAlive: 0,
      gameOver: this.gameOver, victory: false,
      stageName: this.stage.name, totalWaves: this.WAVES.length,
      speed: 1, freezeUntil: 0, wallUntil: 0,
    };
    this.handleSpeedChange = this.handleSpeedChange.bind(this);
    this.events.once('shutdown', this.shutdownGame, this);
    this.enemies = this.add.group();
    this.projectiles = this.add.group();
    this.towerGroup = this.add.group();
    this.slotGroup = this.add.group();

    this.drawBackground();
    this.drawPath();
    this.drawBase();
    this.createSlots();

    this.rangeIndicator = this.add.circle(0,0,0, 0x88ddaa, 0.15)
      .setStrokeStyle(2, 0x88ddaa, 0.6).setVisible(false);

    this.fxLayer = this.add.container(0,0);
    this.projectileLayer = this.add.graphics().setDepth(20);

    this.scene.launch('UIScene', { gameScene: this });
    this.events.emit('stateUpdate', this.state);
    this.events.on('startWave', this.startWave, this);
    this.events.on('useItem', this.useItem, this);
    this.events.on('setSpeed', this.handleSpeedChange, this);
  }

  handleSpeedChange(v) {
    this.state.speed = v;
    if (this.spawnTimer) this.spawnTimer.timeScale = v;
  }

  shutdownGame() {
    this.events.off('startWave', this.startWave, this);
    this.events.off('useItem', this.useItem, this);
    this.events.off('setSpeed', this.handleSpeedChange, this);
    this.tweens.killAll();
    this.time.removeAllEvents();
    if (this.physics && this.physics.world && this.physics.world.shutdown) this.physics.world.shutdown();
    if (this.enemies && this.enemies.clear) this.enemies.clear(true, true);
    if (this.projectiles && this.projectiles.clear) this.projectiles.clear(true, true);
    if (this.towerGroup && this.towerGroup.clear) this.towerGroup.clear(true, true);
    if (this.slotGroup && this.slotGroup.clear) this.slotGroup.clear(true, true);
    for (const e of this.activeEnemies || []) if (e.container && e.container.scene) e.container.destroy();
    for (const t of this.towers || []) if (t.container && t.container.scene) t.container.destroy();
    for (const s of this.slots || []) if (s.container && s.container.scene) s.container.destroy();
    if (this.projectileLayer && this.projectileLayer.scene) this.projectileLayer.destroy();
    if (this.rangeIndicator && this.rangeIndicator.scene) this.rangeIndicator.destroy();
    this.activeEnemies = [];
    this.activeProjectiles = [];
    this.towers = [];
    this.slots = [];
    this.spawnTimer = null;
  }

  exitToGameOver(data) {
    this.scene.stop('UIScene');
    this.scene.stop('GameScene');
    this.scene.start('GameOverScene', data);
  }

  // ---------- arte ----------
  drawBackground() {
    const p = this.stage.palette;
    const g = this.add.graphics();
    // céu/fog gradient simulado
    g.fillStyle(p.fog,1).fillRect(0,0,W,H);
    g.fillStyle(p.bg,1).fillRect(0,80,W,H-80);

    // parallax: 2 camadas de montanhas distantes
    const m1 = this.add.graphics();
    m1.fillStyle(p.mtn, 0.55);
    this.drawMountains(m1, 180, 80, 6);
    const m2 = this.add.graphics();
    m2.fillStyle(p.mtn, 0.85);
    this.drawMountains(m2, 230, 60, 8);
    this.parallax1 = m1; this.parallax2 = m2;

    // grama com textura pontilhada
    const grass = this.add.graphics();
    for (let i=0;i<260;i++){
      grass.fillStyle(p.moss, Phaser.Math.FloatBetween(0.18,0.4));
      grass.fillCircle(Phaser.Math.Between(0,W), Phaser.Math.Between(0,H), Phaser.Math.Between(20,90));
    }
    for (let i=0;i<400;i++){
      grass.fillStyle(p.mossL, Phaser.Math.FloatBetween(0.2,0.5));
      grass.fillCircle(Phaser.Math.Between(0,W), Phaser.Math.Between(0,H), Phaser.Math.Between(2,5));
    }
  }
  drawMountains(g, baseY, h, n) {
    const step = W/n;
    g.beginPath();
    g.moveTo(0, baseY+h);
    for (let i=0;i<=n;i++) {
      const x = i*step;
      const y = baseY - Math.abs(Math.sin(i*1.3))*h;
      g.lineTo(x,y);
    }
    g.lineTo(W, baseY+h);
    g.closePath();
    g.fillPath();
  }

  drawPath() {
    const p = this.stage.palette;
    const g = this.add.graphics();
    g.lineStyle(56, p.pathEdge, 1);
    this.strokePath(g);
    g.lineStyle(46, p.path, 1);
    this.strokePath(g);
    // tile pedras pontilhadas
    g.fillStyle(0x000000, 0.2);
    for (let i=0;i<this.PATH.length-1;i++){
      const a=this.PATH[i], b=this.PATH[i+1];
      const d=Math.hypot(b.x-a.x,b.y-a.y);
      const steps=Math.floor(d/14);
      for (let s=0;s<steps;s++){
        const t=s/steps;
        const x=a.x+(b.x-a.x)*t + Phaser.Math.Between(-12,12);
        const y=a.y+(b.y-a.y)*t + Phaser.Math.Between(-12,12);
        g.fillCircle(x,y,Phaser.Math.Between(2,4));
      }
    }
  }
  strokePath(g) {
    g.beginPath();
    g.moveTo(this.PATH[0].x, this.PATH[0].y);
    for (let i=1;i<this.PATH.length;i++) g.lineTo(this.PATH[i].x, this.PATH[i].y);
    g.strokePath();
  }

  drawBase() {
    const last = this.PATH[this.PATH.length-1];
    const bx = last.x + (last.x > W/2 ? -10 : 10), by = last.y;
    this.baseSprite = this.add.container(bx, by);
    const glow = this.add.circle(0,0,50, 0x9a5fbf, 0.25);
    const tower = this.add.rectangle(0,0,52,72, 0x6a3a8a).setStrokeStyle(2, 0x2a1438);
    const top = this.add.triangle(0,-46, -28,0, 28,0, 0,-22, 0x4a2870);
    const rune = this.add.text(0,0,"⚜", {fontSize:'28px', color:'#ffd9ff'}).setOrigin(0.5);
    this.baseSprite.add([glow, tower, top, rune]);
    this.tweens.add({ targets: glow, scale: 1.25, alpha: 0.45, yoyo:true, repeat:-1, duration:1400 });
  }

  createSlots() {
    this.slots = this.SLOTS.map((s, i) => {
      const c = this.add.container(s.x, s.y);
      const ring = this.add.circle(0,0,22, 0x5a4a30, 0.45).setStrokeStyle(2, 0x9c8456, 0.8);
      const cross = this.add.text(0,0,"+", {fontSize:'22px', color:'#d8c89a', fontStyle:'bold'}).setOrigin(0.5);
      c.add([ring, cross]);
      c.setSize(50,50).setInteractive({ useHandCursor: true });
      c.on('pointerover', () => ring.setFillStyle(0x9c8456, 0.6));
      c.on('pointerout',  () => ring.setFillStyle(0x5a4a30, 0.45));
      c.on('pointerdown', () => this.openSlotMenu(i));
      this.slotGroup.add(c);
      return { x: s.x, y: s.y, container: c, tower: null, ring, cross };
    });
  }

  openSlotMenu(slotIndex) {
    const slot = this.slots[slotIndex];
    if (slot.tower) return;
    this.scene.get('UIScene').showBuildMenu(slot.x, slot.y, (typeKey) => {
      this.buildTower(slotIndex, typeKey);
    });
  }

  buildTower(slotIndex, typeKey) {
    const slot = this.slots[slotIndex];
    const def = TOWER_TYPES[typeKey];
    if (!def || slot.tower || this.state.gold < def.cost) return;
    this.state.gold -= def.cost;

    slot.container.disableInteractive();
    slot.ring.setVisible(false); slot.cross.setVisible(false);

    const c = this.add.container(slot.x, slot.y);
    const base = this.add.circle(0,8,22, 0x2a2418).setStrokeStyle(2, 0x6b5a36);
    c.add(base);
    // silhuetas distintas
    if (typeKey === 'archer') {
      const body = this.add.triangle(0,-4, -10,12, 10,12, 0,-18, def.color).setStrokeStyle(1, 0x1a2218);
      const head = this.add.circle(0,-22,7, 0xe8d2a0);
      const bow = this.add.arc(8,-6,10,-60,60).setStrokeStyle(2,0x8a6a3a);
      c.add([body, head, bow]);
    } else if (typeKey === 'dwarf') {
      const body = this.add.rectangle(0,-2,24,22, def.color).setStrokeStyle(1, 0x1a1208);
      const head = this.add.circle(0,-18,8, 0xd0a868);
      const beard = this.add.triangle(0,-12, -8,-12, 8,-12, 0,2, 0xd8c898);
      const hammer = this.add.rectangle(14,-8,6,16, 0x999999).setStrokeStyle(1, 0x333);
      c.add([body, head, beard, hammer]);
    } else if (typeKey === 'mage') {
      const robe = this.add.triangle(0,-2, -16,14, 16,14, 0,-22, def.color).setStrokeStyle(1, 0x2a1248);
      const hood = this.add.triangle(0,-26, -8,-14, 8,-14, 0,-34, 0x3a1860);
      const orb = this.add.circle(10,-4,5, 0xc89cff).setStrokeStyle(1, 0xffffff, 0.6);
      c.add([robe, hood, orb]);
      this.tweens.add({ targets: orb, alpha: 0.4, yoyo:true, repeat:-1, duration:800 });
    }

    c.setSize(50,50).setInteractive({ useHandCursor: true });

    const tower = { x: slot.x, y: slot.y, type: typeKey, def, container: c, lastFire: 0, target: null };
    slot.tower = tower;
    this.towers.push(tower);
    this.towerGroup.add(c);

    c.on('pointerover', () => this.rangeIndicator.setPosition(slot.x, slot.y).setRadius(def.range).setVisible(true));
    c.on('pointerout', () => this.rangeIndicator.setVisible(false));
    this.events.emit('stateUpdate', this.state);
  }

  // ---------- ondas ----------
  startWave() {
    if (this.state.waveActive || this.state.gameOver || this.state.victory) return;
    if (this.state.wave >= this.WAVES.length) return;
    const wave = this.WAVES[this.state.wave];
    this.state.wave++;
    this.state.waveActive = true;
    this.spawnTimer = this.time.addEvent({
      delay: wave.interval, repeat: wave.count - 1,
      callback: () => this.spawnEnemy(wave),
    });
    this.spawnTimer.timeScale = this.state.speed;
    this.events.emit('stateUpdate', this.state);
  }

  spawnEnemy(wave) {
    const t = ENEMY_TYPES[wave.type];
    const start = this.PATH[0];
    const c = this.add.container(start.x, start.y);
    const sz = t.size;
    let body;
    if (wave.type === 'orc') {
      body = this.add.ellipse(0,0,sz,sz*0.95, t.color).setStrokeStyle(2, 0x2a0e08);
      const eye1 = this.add.circle(-5,-2,2,0xffcc44);
      const eye2 = this.add.circle(5,-2,2,0xffcc44);
      c.add([body, eye1, eye2]);
    } else if (wave.type === 'troll') {
      body = this.add.ellipse(0,0,sz*1.05,sz, t.color).setStrokeStyle(3, 0x1a2810);
      const armor = this.add.rectangle(0,2,sz*0.7,sz*0.4, 0x3a3a3a).setStrokeStyle(1,0x666);
      c.add([body, armor]);
    } else {
      body = this.add.ellipse(0,-3,sz,sz*1.2, t.color).setStrokeStyle(2, 0x2a1838);
      body.setAlpha(t.alpha);
      const skull = this.add.text(0,-4,"☠",{fontSize:'14px',color:'#e8d8ff'}).setOrigin(0.5);
      c.add([body, skull]);
      this.tweens.add({ targets: body, alpha: 0.4, yoyo:true, repeat:-1, duration: 600 });
    }
    const hpBg = this.add.rectangle(0,-sz/2-8,sz+4,5, 0x2a1a1a).setStrokeStyle(1,0x000);
    const hpBar = this.add.rectangle(-(sz+4)/2,-sz/2-8,sz+4,5, 0x6cbf4c).setOrigin(0,0.5);
    c.add([hpBg, hpBar]);

    const enemy = {
      container: c, hpBar, body, type: wave.type, typeDef: t,
      hp: wave.hp, maxHp: wave.hp, speed: wave.speed,
      pathIndex: 1, alive: true, reward: t.reward,
      hpBarW: sz+4,
    };
    this.activeEnemies.push(enemy);
    this.enemies.add(c);
    this.state.enemiesAlive++;
  }

  // ---------- itens ----------
  useItem(key) {
    const ui = this.scene.get('UIScene');
    const item = ui.items[key];
    const now = this.time.now;
    if (item.until > now) return; // cooldown
    if (this.state.gold < item.cost) return;
    this.state.gold -= item.cost;
    item.until = now + item.cooldown;

    if (key === 'fire') {
      this.cameras.main.flash(200, 200, 80, 0);
      const overlay = this.add.rectangle(W/2,H/2,W,H, 0xff4400, 0.25);
      this.tweens.add({ targets: overlay, alpha:0, duration:3000, onComplete:()=>overlay.destroy() });
      // dano em área a cada 300ms por 3s
      let ticks = 0;
      const ev = this.time.addEvent({ delay: 300, repeat: 9, callback: () => {
        for (const e of this.activeEnemies) {
          if (!e.alive) continue;
          this.spawnSpark(e.container.x, e.container.y, 0xff8844, 4);
          this.hitEnemy(e, 25);
        }
        ticks++;
      }});
    } else if (key === 'ice') {
      this.state.freezeUntil = now + 4000;
      this.cameras.main.flash(150, 100, 200, 255);
      const overlay = this.add.rectangle(W/2,H/2,W,H, 0x88ccff, 0.3);
      this.tweens.add({ targets: overlay, alpha:0, duration:4000, onComplete:()=>overlay.destroy() });
      for (const e of this.activeEnemies) if (e.alive) e.body.setTint && e.body.setTint(0x88ccff);
    } else if (key === 'lightning') {
      const sorted = this.activeEnemies.filter(e=>e.alive).sort((a,b)=>a.hp-b.hp).slice(0,5);
      let prev = { x: W/2, y: 0 };
      sorted.forEach((e,i) => {
        this.time.delayedCall(i*80, () => {
          if (!e.alive) return;
          const line = this.add.line(0,0, prev.x, prev.y, e.container.x, e.container.y, 0xffffaa).setOrigin(0,0).setLineWidth(3);
          this.tweens.add({ targets: line, alpha:0, duration:300, onComplete:()=>line.destroy() });
          this.spawnSpark(e.container.x, e.container.y, 0xffff88, 8);
          this.hitEnemy(e, 99999);
          prev = { x: e.container.x, y: e.container.y };
        });
      });
    } else if (key === 'wall') {
      this.state.wallUntil = now + 6000;
      const mid = this.PATH[Math.floor(this.PATH.length/2)];
      const wall = this.add.rectangle(mid.x, mid.y, 60, 60, 0x888888).setStrokeStyle(3, 0x444);
      this.tweens.add({ targets: wall, alpha:0, duration:6000, onComplete:()=>wall.destroy() });
    } else if (key === 'gold') {
      this.state.gold += 100;
      const t = this.add.text(W/2, H/2, "+100 OURO", {fontSize:'48px', color:'#ffcc44', fontStyle:'bold'}).setOrigin(0.5);
      this.tweens.add({ targets: t, y: H/2-80, alpha:0, duration:1500, onComplete:()=>t.destroy() });
    }
    this.events.emit('stateUpdate', this.state);
  }

  spawnSpark(x, y, color, n) {
    for (let i=0;i<n;i++){
      const ang = Math.random()*Math.PI*2;
      const sp = 60 + Math.random()*120;
      const p = this.add.circle(x,y,3,color);
      const dx = Math.cos(ang)*sp, dy = Math.sin(ang)*sp;
      this.tweens.add({ targets: p, x: x+dx, y: y+dy, alpha:0, scale:0.2, duration: 500, onComplete:()=>p.destroy() });
    }
  }

  // ---------- update ----------
  update(time, delta) {
    if (this.state.gameOver || this.state.victory) return;
    const dt = (delta/1000) * this.state.speed;
    this.projectileLayer.clear();

    // parallax
    if (this.parallax1) this.parallax1.x = Math.sin(time*0.00005)*8;
    if (this.parallax2) this.parallax2.x = Math.sin(time*0.0001)*15;

    const frozen = time < this.state.freezeUntil;
    const wallActive = time < this.state.wallUntil;
    const wallIdx = Math.floor(this.PATH.length/2);

    // mover inimigos
    for (const e of this.activeEnemies) {
      if (!e.alive) continue;
      if (frozen) continue;
      if (wallActive && e.pathIndex === wallIdx) continue;
      const target = this.PATH[e.pathIndex];
      if (!target) continue;
      const dx = target.x - e.container.x, dy = target.y - e.container.y;
      const dist = Math.hypot(dx, dy);
      const step = e.speed * dt;
      if (step >= dist) {
        e.container.x = target.x; e.container.y = target.y;
        e.pathIndex++;
        if (e.pathIndex >= this.PATH.length) this.enemyReachedBase(e);
      } else {
        e.container.x += (dx/dist)*step;
        e.container.y += (dy/dist)*step;
      }
    }
    // remover gelo tint quando passar
    if (!frozen) for (const e of this.activeEnemies) if (e.alive && e.body.clearTint) e.body.clearTint();

    // torres atiram (escala com speed)
    for (const t of this.towers) {
      if (time - t.lastFire < t.def.fireRate / this.state.speed) continue;
      const target = this.findTarget(t);
      if (target) {
        this.fireProjectile(t, target);
        t.lastFire = time;
        t.container.setScale(1.08);
        t.pulseUntil = time + 70;
      }
    }

    // projéteis (sem tweens por frame — evita travamento)
    for (const p of this.activeProjectiles) {
      if (!p.alive) continue;
      const tgt = p.target;
      if (!tgt || !tgt.alive || !tgt.container || !tgt.container.scene) {
        p.alive = false;
        continue;
      }
      const tx = tgt.container.x, ty = tgt.container.y;
      const dx = tx - p.x;
      const dy = ty - p.y;
      const d = Math.hypot(dx, dy) || 0.0001;
      const step = p.speed * dt;
      if (step >= d) {
        if (p.splash) {
          this.spawnSpark(tx, ty, p.color, 10);
          for (const e of this.activeEnemies) {
            if (!e.alive) continue;
            const dd = Math.hypot(e.container.x - tx, e.container.y - ty);
            if (dd <= p.splash) this.hitEnemy(e, p.damage);
          }
        } else {
          this.hitEnemy(tgt, p.damage);
        }
        p.alive = false;
      } else {
        p.x += (dx/d)*step;
        p.y += (dy/d)*step;
        const tailX = p.x - (dx/d)*12;
        const tailY = p.y - (dy/d)*12;
        this.projectileLayer.lineStyle(3, p.color, 0.35);
        this.projectileLayer.beginPath();
        this.projectileLayer.moveTo(tailX, tailY);
        this.projectileLayer.lineTo(p.x, p.y);
        this.projectileLayer.strokePath();
        this.projectileLayer.fillStyle(p.color, 1);
        this.projectileLayer.fillCircle(p.x, p.y, p.radius);
      }
    }
    this.activeProjectiles = this.activeProjectiles.filter(p => p.alive);
    this.activeEnemies = this.activeEnemies.filter(e => e.alive);

    for (const t of this.towers) {
      if (t.pulseUntil && time > t.pulseUntil && t.container && t.container.scaleX !== 1) t.container.setScale(1);
    }

    if (this.state.waveActive && this.state.enemiesAlive === 0
        && this.spawnTimer && this.spawnTimer.getOverallProgress() >= 1) {
      this.state.waveActive = false;
      this.state.gold += 25; // bônus de onda
      if (this.state.wave >= this.WAVES.length) {
        this.state.victory = true;
        this.events.emit('stateUpdate', this.state);
        this.exitToGameOver({ victory: true, wave: this.state.wave, stage: this.stage.name });
      } else {
        this.events.emit('stateUpdate', this.state);
      }
    }
  }

  findTarget(tower) {
    let best = null, bestProg = -1;
    for (const e of this.activeEnemies) {
      if (!e.alive) continue;
      const d = Math.hypot(e.container.x - tower.x, e.container.y - tower.y);
      if (d <= tower.def.range && e.pathIndex > bestProg) { best = e; bestProg = e.pathIndex; }
    }
    return best;
  }

  fireProjectile(tower, target) {
    this.activeProjectiles.push({
      x: tower.x,
      y: tower.y - 10,
      target,
      damage: tower.def.damage,
      speed: 540,
      radius: tower.type === 'archer' ? 4 : 6,
      alive: true,
      color: tower.def.projColor,
      splash: tower.def.splash,
    });
  }

  hitEnemy(e, dmg) {
    if (!e.alive) return;
    e.hp -= dmg;
    const ratio = Math.max(0, e.hp / e.maxHp);
    e.hpBar.width = e.hpBarW * ratio;
    if (e.body.setFillStyle) {
      const orig = e.typeDef.color;
      e.body.setFillStyle(0xffffff);
      this.time.delayedCall(60, () => { if (e.alive && e.body.setFillStyle) e.body.setFillStyle(orig); });
    }
    if (e.hp <= 0) {
      e.alive = false;
      this.spawnSpark(e.container.x, e.container.y, e.typeDef.spark, 12);
      this.state.gold += e.reward;
      this.state.enemiesAlive--;
      e.container.destroy();
      this.events.emit('stateUpdate', this.state);
    }
  }

  enemyReachedBase(e) {
    if (!e.alive) return;
    e.alive = false;
    this.state.enemiesAlive--;
    this.state.hp -= 1;
    e.container.destroy();
    this.cameras.main.flash(120, 80, 0, 0);
    this.events.emit('stateUpdate', this.state);
    if (this.state.hp <= 0) {
      this.state.gameOver = true;
      this.exitToGameOver({ victory: false, wave: this.state.wave, stage: this.stage.name });
    }
  }
}

// =================== UI ===================
class UIScene extends Phaser.Scene {
  constructor() { super('UIScene'); }
  init(data) {
    this.gameScene = data.gameScene || null;
    this.stageId = this.gameScene ? this.gameScene.stage.id : 0;
  }
  create() {
    const game = this.gameScene || this.scene.get('GameScene');
    this.gameScene = game;
    this.refreshHandler = (s) => this.refresh(s);
    this.events.once('shutdown', this.shutdownUI, this);

    this.add.rectangle(W/2, 28, W, 56, 0x000000, 0.6);
    this.hpText    = this.add.text(20, 16, "HP: 20", {fontSize:'20px', color:'#ff8a8a', fontStyle:'bold'});
    this.goldText  = this.add.text(160, 16, "Ouro: 150", {fontSize:'20px', color:'#ffcc44', fontStyle:'bold'});
    this.waveText  = this.add.text(340, 16, "Onda: 0/10", {fontSize:'20px', color:'#d8d2bf', fontStyle:'bold'});
    this.title = this.add.text(W/2, 8, STAGES[this.stageId].name, {fontSize:'18px', color:'#c8a8ff', fontStyle:'italic'}).setOrigin(0.5,0);

    // botão velocidade
    this.speedIcons = ['🐢','🐇','🚀'];
    this.speedVals = [1,2,3];
    this.speedIdx = 0;
    this.speedBtn = this.add.container(W - 380, 28);
    const sbg = this.add.rectangle(0,0,90,40, 0x2d3a5a).setStrokeStyle(2, 0x6c8cbf);
    this.speedTxt = this.add.text(0,0,"🐢 1×", {fontSize:'18px', color:'#e0e8ff', fontStyle:'bold'}).setOrigin(0.5);
    this.speedBtn.add([sbg, this.speedTxt]);
    this.speedBtn.setSize(90,40).setInteractive({useHandCursor:true});
    this.speedBtn.on('pointerdown', () => {
      this.speedIdx = (this.speedIdx+1) % 3;
      this.speedTxt.setText(`${this.speedIcons[this.speedIdx]} ${this.speedVals[this.speedIdx]}×`);
      game.events.emit('setSpeed', this.speedVals[this.speedIdx]);
    });

    // botão loja
    this.shopBtn = this.add.container(W - 270, 28);
    const shbg = this.add.rectangle(0,0,90,40, 0x5a3a2d).setStrokeStyle(2, 0xbf8c6c);
    const shtx = this.add.text(0,0,"🛒 Loja", {fontSize:'16px', color:'#ffe0c0', fontStyle:'bold'}).setOrigin(0.5);
    this.shopBtn.add([shbg, shtx]);
    this.shopBtn.setSize(90,40).setInteractive({useHandCursor:true});
    this.shopBtn.on('pointerdown', () => this.toggleShop());

    // iniciar onda
    this.startBtn = this.add.container(W - 130, 28);
    const bg = this.add.rectangle(0,0,200,40, 0x2d5a2a).setStrokeStyle(2, 0x6cbf4c);
    const txt = this.add.text(0,0,"Iniciar Onda", {fontSize:'18px', color:'#e8ffe0', fontStyle:'bold'}).setOrigin(0.5);
    this.startBtn.add([bg, txt]).setSize(200,40).setInteractive({useHandCursor:true});
    this.startBtn.on('pointerover', () => bg.setFillStyle(0x3d7a3a));
    this.startBtn.on('pointerout',  () => bg.setFillStyle(0x2d5a2a));
    this.startBtn.on('pointerdown', () => game.events.emit('startWave'));

    // itens
    this.items = {
      fire:      { icon:'🔥', name:'Chuva de Fogo',     cost:150, cooldown:60000, until:0, desc:'Dano em área 3s' },
      ice:       { icon:'❄️', name:'Gelo Eterno',       cost:120, cooldown:45000, until:0, desc:'Congela todos 4s' },
      lightning: { icon:'⚡', name:'Relâmpago',          cost:200, cooldown:30000, until:0, desc:'Mata 5 mais fracos' },
      wall:      { icon:'🛡️', name:'Muralha Temp.',     cost:80,  cooldown:30000, until:0, desc:'Bloqueia caminho 6s' },
      gold:      { icon:'💰', name:'Bênção do Anão',    cost:50,  cooldown:90000, until:0, desc:'+100 ouro' },
    };
    this.shopOpen = false;
    this.buildShop();

    game.events.on('stateUpdate', this.refreshHandler);
    this.menu = null;
  }

  shutdownUI() {
    if (this.gameScene && this.gameScene.events && this.refreshHandler) {
      this.gameScene.events.off('stateUpdate', this.refreshHandler);
    }
    this.closeMenu();
    this.tweens.killAll();
    this.time.removeAllEvents();
    this.gameScene = null;
    this.refreshHandler = null;
  }

  buildShop() {
    this.shop = this.add.container(W, 80).setVisible(false);
    const w = 240, h = 540;
    const bg = this.add.rectangle(0,0,w,h, 0x14181a, 0.96).setOrigin(0).setStrokeStyle(2, 0x6b5a36);
    const title = this.add.text(w/2, 10, "Loja Mística", {fontSize:'18px', color:'#e8d8ff', fontStyle:'bold'}).setOrigin(0.5,0);
    this.shop.add([bg, title]);

    this.shopRows = {};
    Object.entries(this.items).forEach(([key, it], i) => {
      const yy = 40 + i*100;
      const row = this.add.rectangle(8, yy, w-16, 92, 0x2a2418, 0.9).setOrigin(0).setStrokeStyle(1, 0x4a3e22);
      const ico = this.add.text(20, yy+10, it.icon, {fontSize:'32px'});
      const name = this.add.text(70, yy+8, it.name, {fontSize:'15px', color:'#e8e0c0', fontStyle:'bold'});
      const desc = this.add.text(70, yy+30, it.desc, {fontSize:'11px', color:'#a8a08c'});
      const cost = this.add.text(70, yy+50, `Custo: ${it.cost}`, {fontSize:'12px', color:'#ffcc44'});
      const cdTxt = this.add.text(70, yy+68, '', {fontSize:'12px', color:'#ff8888'});
      const overlay = this.add.rectangle(8, yy, w-16, 92, 0x000, 0.5).setOrigin(0).setVisible(false);
      this.shop.add([row, ico, name, desc, cost, cdTxt, overlay]);
      row.setInteractive({useHandCursor:true});
      row.on('pointerover', () => row.setFillStyle(0x3d3424));
      row.on('pointerout',  () => row.setFillStyle(0x2a2418));
      row.on('pointerdown', () => this.scene.get('GameScene').events.emit('useItem', key));
      this.shopRows[key] = { cdTxt, overlay };
    });
  }

  toggleShop() {
    this.shopOpen = !this.shopOpen;
    this.shop.setVisible(this.shopOpen);
    this.tweens.add({ targets: this.shop, x: this.shopOpen ? W-240 : W, duration: 200 });
  }

  update(time) {
    if (!this.shopOpen) return;
    Object.entries(this.items).forEach(([key, it]) => {
      const row = this.shopRows[key];
      const remain = it.until - this.scene.get('GameScene').time.now;
      if (remain > 0) {
        row.cdTxt.setText(`Recarga: ${(remain/1000).toFixed(1)}s`);
        row.overlay.setVisible(true);
      } else {
        row.cdTxt.setText('');
        row.overlay.setVisible(false);
      }
    });
  }

  refresh(s) {
    this.hpText.setText(`HP: ${s.hp}`);
    this.goldText.setText(`Ouro: ${s.gold}`);
    this.waveText.setText(`Onda: ${s.wave} / ${s.totalWaves}`);
    this.startBtn.setAlpha(s.waveActive ? 0.4 : 1);
  }

  showBuildMenu(x, y, onPick) {
    this.closeMenu();
    const game = this.scene.get('GameScene');
    const types = Object.entries(TOWER_TYPES);
    const w = 240, lineH = 64, h = 30 + types.length * lineH;
    let mx = x + 40, my = y - h/2;
    if (mx + w > W) mx = x - 40 - w;
    if (my < 60) my = 60;
    if (my + h > H) my = H - h - 10;

    const c = this.add.container(mx, my);
    const bg = this.add.rectangle(0,0,w,h, 0x14181a, 0.96).setOrigin(0).setStrokeStyle(2, 0x6b5a36);
    const title = this.add.text(w/2, 8, "Construir Torre", {fontSize:'14px', color:'#d8c89a', fontStyle:'bold'}).setOrigin(0.5,0);
    c.add([bg, title]);

    types.forEach(([key, def], i) => {
      const yy = 30 + i*lineH;
      const row = this.add.rectangle(4, yy, w-8, lineH-6, 0x2a2418, 0.8).setOrigin(0).setStrokeStyle(1, 0x4a3e22);
      const swatch = this.add.rectangle(20, yy + (lineH-6)/2, 18, 26, def.color).setStrokeStyle(1, 0x000);
      const canAfford = game.state.gold >= def.cost;
      const name = this.add.text(40, yy + 6, def.name, {fontSize:'14px', color:'#e8e0c0', fontStyle:'bold'});
      const cost = this.add.text(40, yy + 24, `Custo: ${def.cost}`, {fontSize:'12px', color: canAfford ? '#ffcc44' : '#aa6666'});
      const desc = this.add.text(40, yy + 40, def.desc, {fontSize:'11px', color:'#a8a08c'});
      c.add([row, swatch, name, cost, desc]);
      row.setInteractive({useHandCursor:true});
      row.on('pointerover', () => row.setFillStyle(0x3d3424));
      row.on('pointerout',  () => row.setFillStyle(0x2a2418));
      row.on('pointerdown', () => { if (!canAfford) return; onPick(key); this.closeMenu(); });
    });

    this.menu = c;
    this.menuBlocker = this.add.rectangle(0,0,W,H, 0x000, 0.0001).setOrigin(0).setInteractive();
    this.menuBlocker.on('pointerdown', () => this.closeMenu());
    this.children.bringToTop(c);
  }

  closeMenu() {
    if (this.menu) { this.menu.destroy(); this.menu = null; }
    if (this.menuBlocker) { this.menuBlocker.destroy(); this.menuBlocker = null; }
  }
}

// =================== GAME OVER ===================
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOverScene'); }
  create(data) {
    this.add.rectangle(W/2, H/2, W, H, 0x000, 0.75);
    const title = data.victory ? "VITÓRIA!" : "DERROTA";
    const color = data.victory ? '#9cffb0' : '#ff8a8a';
    this.add.text(W/2, H/2 - 80, title, {fontSize:'72px', color, fontStyle:'bold'}).setOrigin(0.5);
    this.add.text(W/2, H/2 - 10,
      data.victory ? `${data.stage} foi defendida.` : `As trevas tomaram ${data.stage} na onda ${data.wave}.`,
      {fontSize:'20px', color:'#d8d2bf'}).setOrigin(0.5);

    const mk = (x, label, fn) => {
      const c = this.add.container(x, H/2 + 80);
      const bg = this.add.rectangle(0,0,220,46, 0x2d5a2a).setStrokeStyle(2, 0x6cbf4c);
      const t = this.add.text(0,0,label,{fontSize:'18px', color:'#e8ffe0', fontStyle:'bold'}).setOrigin(0.5);
      c.add([bg, t]).setSize(220,46).setInteractive({useHandCursor:true});
      c.on('pointerdown', fn);
      return c;
    };
    mk(W/2 - 130, "Selecionar Estágio", () => {
      this.scene.stop('GameOverScene'); this.scene.stop('UIScene'); this.scene.stop('GameScene');
      this.scene.start('StageSelectScene');
    });
    mk(W/2 + 130, "Jogar Novamente", () => {
      this.scene.stop('GameOverScene'); this.scene.stop('UIScene'); this.scene.stop('GameScene');
      this.scene.start('BootScene');
    });
  }
}

const config = {
  type: Phaser.CANVAS, parent: 'game', width: W, height: H,
  backgroundColor: '#0b0d0a',
  scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH },
  scene: [BootScene, StageSelectScene, GameScene, UIScene, GameOverScene],
};
new Phaser.Game(config);
</script>
