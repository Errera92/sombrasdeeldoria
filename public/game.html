<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Sombras de Eldoria - Tower Defense</title>
<style>
  html, body {
    margin:0; padding:0; background:#000; color:#d8d2bf;
    width:100%; height:100%; overflow:hidden;
    font-family: 'Trebuchet MS', sans-serif;
    overscroll-behavior: none; touch-action: none;
    display:flex; align-items:center; justify-content:center;
    box-sizing: border-box;
  }
  #game {
    margin: 0 auto;
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  #game canvas { touch-action: none; display:block; margin: 0 auto; }

  /* "Tap to fullscreen" hint */
  #fs-hint {
    position: fixed; left: 50%; bottom: calc(env(safe-area-inset-bottom) + 14px);
    transform: translateX(-50%);
    background: rgba(0,0,0,0.55); color:#e8c8ff;
    padding: 8px 14px; border-radius: 20px;
    font-size: 13px; letter-spacing: 0.5px;
    border: 1px solid rgba(201,168,76,0.5);
    pointer-events:none; z-index: 50;
    animation: fsPulse 1.8s ease-in-out infinite;
  }
  @keyframes fsPulse { 0%,100%{opacity:.55} 50%{opacity:1} }

  /* Portrait warning overlay */
  #rotate-overlay {
    position: fixed; inset:0;
    background: rgba(5,3,10,0.92);
    color:#e8c8ff;
    display:none;
    align-items:center; justify-content:center; flex-direction:column;
    z-index: 100;
    text-align:center; padding: 24px;
  }
  #rotate-overlay.active { display:flex; }
  #rotate-overlay .phone {
    width: 56px; height: 96px;
    border: 4px solid #c9a84c; border-radius: 10px;
    position: relative;
    animation: rotatePhone 1.8s ease-in-out infinite;
    margin-bottom: 28px;
  }
  #rotate-overlay .phone::after {
    content:''; position:absolute; bottom:6px; left:50%;
    transform:translateX(-50%);
    width:14px; height:14px; border-radius:50%;
    background:#c9a84c;
  }
  @keyframes rotatePhone {
    0%,20% { transform: rotate(0deg); }
    60%,100% { transform: rotate(-90deg); }
  }
  #rotate-overlay p {
    font-family: serif; font-size: 20px; margin:0;
    text-shadow: 0 2px 6px #000;
  }
  body.portrait #game { visibility: hidden; }
</style>
<script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<div id="game"></div>
<div id="fs-hint">Toque para tela cheia</div>
<div id="rotate-overlay" role="alertdialog" aria-label="Gire o dispositivo">
  <div class="phone" aria-hidden="true"></div>
  <p>Gire o dispositivo para jogar</p>
</div>
<script>
// =============== MOBILE FULLSCREEN + ORIENTATION ===============
(function(){
  const hint = document.getElementById('fs-hint');
  const overlay = document.getElementById('rotate-overlay');

  function isPortrait() {
    if (screen.orientation && screen.orientation.type) {
      return screen.orientation.type.startsWith('portrait');
    }
    return window.innerHeight > window.innerWidth;
  }
  function updateOrientation() {
    const portrait = isPortrait() && window.matchMedia('(max-width: 900px)').matches;
    overlay.classList.toggle('active', portrait);
    document.body.classList.toggle('portrait', portrait);
    try { window.eldoriaGame && window.eldoriaGame.scale.refresh(); } catch(_) {}
  }
  window.addEventListener('orientationchange', updateOrientation);
  window.addEventListener('resize', updateOrientation);
  setTimeout(updateOrientation, 100);

  let fsRequested = false;
  function goFullscreen() {
    if (fsRequested) return;
    fsRequested = true;
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen;
    if (req) {
      Promise.resolve(req.call(el)).then(() => {
        try { screen.orientation && screen.orientation.lock && screen.orientation.lock('landscape').catch(()=>{}); } catch(_){}
      }).catch(()=>{ fsRequested = false; });
    }
    if (hint) hint.style.display = 'none';
  }
  window.addEventListener('touchend', goFullscreen, { once: false, passive: true });
  window.addEventListener('pointerdown', goFullscreen, { once: false, passive: true });
  document.addEventListener('fullscreenchange', () => {
    if (!document.fullscreenElement) fsRequested = false;
    else if (hint) hint.style.display = 'none';
  });
})();
</script>

// Multiplicador a partir dos upgrades ATIVOS (excluindo TD_MULT — que vem da loja
// e agora só usamos para startingGoldBonus). Para cada upgrade ativo cujo stat e
// torre batem, soma effect * nível comprado.
window.getActiveMult = function (stat, towerType) {
  let mult = stat === 'startingGold' ? 0 : 1;
  const active = window.TD_ACTIVE_UPGRADES || {};
  const owned = window.TD_TOWER_UPGRADES || {};
  for (const id of Object.keys(UPGRADE_DEFS)) {
    const def = UPGRADE_DEFS[id];
    if (def.stat !== stat) continue;
    if (def.tower !== towerType && def.tower !== 'global') continue;
    if (!active[id]) continue;
    const lvl = owned[id] | 0;
    if (lvl <= 0) continue;
    mult += def.effect * lvl;
  }
  return mult;
};

window.TD_POST = function (payload) {
  try { window.parent && window.parent.postMessage(payload, window.TD_PARENT_ORIGIN || '*'); } catch (_) {}
};
window.addEventListener('message', (ev) => {
  if (ev.source !== window.parent) return;
  if (ev.origin !== window.location.origin) return;
  const d = ev.data;
  if (!d || typeof d !== 'object') return;
  if (d.type === 'td:bootstrap' || d.type === 'td:update') {
    window.TD_PARENT_ORIGIN = ev.origin;
    if (d.multipliers) {
      window.TD_MULT = {
        damage: +d.multipliers.damage || 1,
        range: +d.multipliers.range || 1,
        fireRate: +d.multipliers.fireRate || 1,
        goldBonus: +d.multipliers.goldBonus || 1,
        startingGoldBonus: +d.multipliers.startingGoldBonus || 0,
      };
    }
    if (d.towerUpgrades && typeof d.towerUpgrades === 'object') {
      window.TD_TOWER_UPGRADES = d.towerUpgrades;
    } else if (d.type === 'td:bootstrap') {
      window.TD_TOWER_UPGRADES = window.TD_TOWER_UPGRADES || {};
    }
    if (d.type === 'td:bootstrap') window.TD_ACTIVE_UPGRADES = {};
    if (typeof d.nickname === 'string') window.TD_PLAYER.nickname = d.nickname;
    if (typeof d.gems === 'number') window.TD_PLAYER.gems = d.gems;
    try {
      const game = window.eldoriaGame;
      const ui = game && game.scene && game.scene.getScene && game.scene.getScene('UIScene');
      if (ui && ui.refreshPlayerHud) ui.refreshPlayerHud();

  }
});

// RNG determinístico (mulberry32) — mesma seed gera sempre o mesmo path.
function _mulberry32(seed) {
  let s = seed >>> 0;
  return function() {
    s = (s + 0x6D2B79F5) >>> 0;
    let t = s;
    t = Math.imul(t ^ (t >>> 15), t | 1);
    t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// Gera path + slots únicos por (stageId, phaseIndex).
// Varia: posição Y de entrada (100..600), nº de segmentos (4..8),
// direção predominante (horizontal-first / vertical-first / diagonal).
function generatePhaseLayout(stageId, phaseIndex) {
  const seed = ((stageId + 1) * 92821) ^ ((phaseIndex + 1) * 16777619);
  const r = _mulberry32(seed >>> 0);
  const W = 1280, H = 720;
  const minY = 100, maxY = 600;
  const entryY = Math.round(minY + r() * (maxY - minY));
  const segments = 4 + Math.floor(r() * 5); // 4..8
  const styles = ['horizontal-first', 'vertical-first', 'diagonal'];
  const style = styles[(stageId * 2 + phaseIndex + Math.floor(r() * 3)) % 3];

  const marginX = 80;
  const path = [{ x: -30, y: entryY }];
  let cx = marginX + Math.round(r() * 120);
  let cy = entryY;
  path.push({ x: cx, y: cy });

  const usableW = W - marginX * 2;
  for (let i = 0; i < segments; i++) {
    const tProg = (i + 1) / segments;
    const targetX = Math.round(marginX + tProg * usableW);
    const targetY = Math.round(minY + r() * (maxY - minY));
    if (style === 'horizontal-first') {
      if (i % 2 === 0) { path.push({ x: targetX, y: cy }); cx = targetX; }
      else { path.push({ x: cx, y: targetY }); cy = targetY; }
    } else if (style === 'vertical-first') {
      if (i % 2 === 0) { path.push({ x: cx, y: targetY }); cy = targetY; }
      else { path.push({ x: targetX, y: cy }); cx = targetX; }
    } else {
      // diagonal: L-step (horizontal seguido de vertical)
      path.push({ x: targetX, y: cy });
      path.push({ x: targetX, y: targetY });
      cx = targetX; cy = targetY;
    }
  }
  if (path[path.length - 1].x < W - marginX) {
    path.push({ x: W - marginX, y: cy });
  }
  // garante saída pela direita
  path.push({ x: W + 30, y: cy });

  // Slots adjacentes ao path, evitando sobreposição.
  const slots = [];
  const used = new Set();
  const tooCloseToPath = (sx, sy, minDist) => {
    for (let i = 0; i < path.length - 1; i++) {
      const a = path[i], b = path[i + 1];
      // distância ponto-segmento
      const dx = b.x - a.x, dy = b.y - a.y;
      const len2 = dx * dx + dy * dy || 1;
      let t = ((sx - a.x) * dx + (sy - a.y) * dy) / len2;
      t = Math.max(0, Math.min(1, t));
      const px = a.x + t * dx, py = a.y + t * dy;
      if (Math.hypot(sx - px, sy - py) < minDist) return true;
    }
    return false;
  };
  const tryAdd = (sx, sy) => {
    if (sx < 50 || sx > W - 50 || sy < 50 || sy > H - 50) return false;
    const key = Math.round(sx / 40) + ',' + Math.round(sy / 40);
    if (used.has(key)) return false;
    if (tooCloseToPath(sx, sy, 60)) return false;
    used.add(key);
    slots.push({ x: Math.round(sx), y: Math.round(sy) });
    return true;
  };

  // 1) tenta posicionar próximo a cada vértice interno do path
  for (let i = 1; i < path.length - 1 && slots.length < 14; i++) {
    const p = path[i];
    for (const [dx, dy] of [[0,-95],[0,95],[-95,0],[95,0],[-80,-80],[80,-80],[-80,80],[80,80]]) {
      if (slots.length >= 14) break;
      tryAdd(p.x + dx, p.y + dy);
    }
  }
  // 2) preenche com grid caso ainda falte
  for (let y = 90; y < H - 70 && slots.length < 12; y += 110) {
    for (let x = 110; x < W - 90 && slots.length < 12; x += 150) {
      tryAdd(x, y);
    }
  }

  return { shape: style, path, slots };
}

function buildStagePhases(stageId) {
  const mixes = PHASE_MIXES[stageId] || PHASE_MIXES[0];
  return mixes.map((m, i) => {
    const layout = generatePhaseLayout(stageId, i);
    return {
      name: m.name,
      mix: m.mix,
      shape: layout.shape,
      path: layout.path,
      slots: layout.slots,
    };
  });
}

    palette: { bg: 0x180408, moss: 0x3a0a10, mossL: 0x5a1018, path: 0x6a0808, pathEdge: 0x1a0204, fog: 0x100204, mtn: 0x2a0608 },
    speedMul: 1.25,
  },

// Injeta as 5 fases (com path/slots únicos) em cada estágio.
STAGES.forEach(s => {
  s.phases = buildStagePhases(s.id);
  // mantém compat: path/slots padrão = fase 1
  s.path = s.phases[0].path;
  s.slots = s.phases[0].slots;
});

function buildWaves(stage, phaseIndex) {
  const phase = stage.phases[phaseIndex] || stage.phases[0];
  const phaseScale = 1 + 0.15 * phaseIndex; // multiplicador progressivo por fase
  const waves = [];
  for (let i=0; i<phase.mix.length; i++) {
    const type = phase.mix[i];
    const t = ENEMY_TYPES[type];
    const tier = i + 1;
    const stageScale = 1 + (stage.baseDifficulty - 1) * 0.18;
    const count = Math.round(6 + tier*1.6 + phaseIndex*0.8);
    const hp = Math.round(t.baseHp * (1 + tier*0.25) * stageScale * phaseScale);
    const speed = Math.round(t.baseSpd * stage.speedMul * (1 + tier*0.02) * phaseScale);
    waves.push({ count, hp, speed, interval: Math.max(320, 800 - tier*40 - phaseIndex*20), type });
  }
  return waves;
}

// =============== HELPERS VISUAIS ===============
const FONT_TITLE = 'Georgia, serif';
const FONT_BTN   = 'Trebuchet MS, sans-serif';

function hpColor(r) {
  if (r > 0.6) return 0x6cbf4c;
  if (r > 0.3) return 0xffcc44;
  return 0xff4d4d;
}

function makeButton(scene, x, y, w, h, label, opts) {
  opts = opts || {};
  const fill      = opts.fill      != null ? opts.fill      : 0x3a1a6e;
  const stroke    = opts.stroke    != null ? opts.stroke    : 0xffd700;
  const hoverFill = opts.hoverFill != null ? opts.hoverFill : 0x5a2aae;
  const fontSize  = opts.fontSize  || 18;
  const fontColor = opts.fontColor || '#ffe8a8';
  const radius    = opts.radius    != null ? opts.radius    : 14;
  const onClick   = opts.onClick   || function(){};

  const c = scene.add.container(x, y);
  const g = scene.add.graphics();
  const draw = (f, s) => {
    g.clear();
    g.fillStyle(f, 1).fillRoundedRect(-w/2, -h/2, w, h, radius);
    g.lineStyle(2, s, 1).strokeRoundedRect(-w/2, -h/2, w, h, radius);
  };
  draw(fill, stroke);
  const txt = scene.add.text(0, 0, label, {
    fontSize: fontSize+'px', color: fontColor, fontFamily: FONT_BTN, fontStyle: 'bold'
  }).setOrigin(0.5);
  txt.setShadow(2, 2, '#000000', 3);
  c.add([g, txt]);
  c.setSize(w, h).setInteractive({ useHandCursor: true });
  c.on('pointerover', () => draw(hoverFill, 0xffffff));
  c.on('pointerout',  () => { draw(fill, stroke); c.setScale(1); });
  c.on('pointerdown', () => {
    scene.tweens.add({ targets: c, scale: 0.95, duration: 80, yoyo: true });
    onClick();
  });
  c.btnRedraw = draw;
  c.btnLabel  = txt;
  return c;
}

// =================== STAGE SELECT ===================
class StageSelectScene extends Phaser.Scene {
  constructor() { super('StageSelectScene'); }
  create() {
    const bgG = this.add.graphics();
    const bands = 40;
    for (let i=0; i<bands; i++) {
      const t = i/(bands-1);
      const r = Math.round(0x18 + (0x05-0x18)*t);
      const gg = Math.round(0x06 + (0x02-0x06)*t);
      const b = Math.round(0x24 + (0x08-0x24)*t);
      bgG.fillStyle((r<<16)|(gg<<8)|b, 1).fillRect(0, i*(H/bands), W, Math.ceil(H/bands)+1);
    }
    const stars = this.add.graphics();
    for (let i=0;i<140;i++){
      stars.fillStyle(0xc8a8ff, Phaser.Math.FloatBetween(0.1,0.45));
      stars.fillCircle(Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),Phaser.Math.FloatBetween(0.6,1.8));
    }

    const titleC = this.add.container(W/2, 70);
    const t1 = this.add.text(0, 0, "SOMBRAS DE ELDORIA", {
      fontSize:'52px', color:'#e8c8ff', fontFamily: FONT_TITLE, fontStyle:'bold'
    }).setOrigin(0.5);
    t1.setShadow(3, 4, '#000000', 8, true, true);
    const t1b = this.add.text(0, 0, "SOMBRAS DE ELDORIA", {
      fontSize:'52px', color:'#6a2a8a', fontFamily: FONT_TITLE, fontStyle:'bold'
    }).setOrigin(0.5).setAlpha(0.45);
    t1b.setShadow(0, 0, '#ffaaff', 18, true, true);
    titleC.add([t1b, t1]);
    this.tweens.add({ targets: titleC, y: 80, yoyo: true, repeat: -1, duration: 1800, ease: 'Sine.inOut' });

    this.add.text(W/2, 120, "Escolha o estágio", {
      fontSize:'22px', color:'#d8d2bf', fontFamily: FONT_TITLE, fontStyle:'italic'
    }).setOrigin(0.5).setShadow(2,2,'#000',3);

    const cardW = 220, cardH = 440, gap = 24;
    const totalW = STAGES.length*cardW + (STAGES.length-1)*gap;
    const startX = (W - totalW)/2;

    STAGES.forEach((s, i) => {
      const x = startX + i*(cardW+gap);
      const y = 160;
      const c = this.add.container(x + cardW/2, y + cardH/2);

      const cardG = this.add.graphics();
      const drawCard = (gold) => {
        cardG.clear();
        cardG.fillStyle(s.palette.bg, 1).fillRoundedRect(-cardW/2, -cardH/2, cardW, cardH, 18);
        cardG.lineStyle(3, gold, 1).strokeRoundedRect(-cardW/2, -cardH/2, cardW, cardH, 18);
      };
      drawCard(0xc9a84c);
      c.add(cardG);

      // preview
      const prev = this.add.graphics();
      prev.fillStyle(s.palette.moss, 1).fillRoundedRect(-cardW/2+12, -cardH/2+96, cardW-24, 130, 10);
      prev.lineStyle(8, s.palette.pathEdge, 1);
      prev.beginPath();
      const px = (p) => -cardW/2+12 + (p.x+30)/1340 * (cardW-24);
      const py = (p) => -cardH/2+96 + (p.y)/720 * 130;
      prev.moveTo(px(s.path[0]), py(s.path[0]));
      for (let k=1;k<s.path.length;k++) prev.lineTo(px(s.path[k]), py(s.path[k]));
      prev.strokePath();
      prev.lineStyle(5, s.palette.path, 1);
      prev.beginPath();
      prev.moveTo(px(s.path[0]), py(s.path[0]));
      for (let k=1;k<s.path.length;k++) prev.lineTo(px(s.path[k]), py(s.path[k]));
      prev.strokePath();
      c.add(prev);

      const icon = this.add.text(0, -cardH/2+50, s.icon, { fontSize:'36px' }).setOrigin(0.5);
      const title = this.add.text(0, -cardH/2+18, s.name, {
        fontSize:'18px', color:'#f0e0ff', fontFamily: FONT_TITLE, fontStyle:'bold', align:'center', wordWrap:{width:cardW-20}
      }).setOrigin(0.5,0);
      title.setShadow(2,2,'#000',4);
      const theme = this.add.text(0, -cardH/2+240, s.theme, {
        fontSize:'12px', color:'#c0b89a', fontFamily: FONT_BTN, fontStyle:'italic'
      }).setOrigin(0.5,0);
      const stars2 = '★'.repeat(s.baseDifficulty) + '☆'.repeat(5-s.baseDifficulty);
      const dif = this.add.text(0, -cardH/2+264, stars2, {fontSize:'20px', color:'#ffcc44'}).setOrigin(0.5,0);
      dif.setShadow(2,2,'#000',3);
      const phasesTxt = this.add.text(0, -cardH/2+300, `${s.phases.length} fases`, {
        fontSize:'14px', color:'#e8d8b0', fontFamily: FONT_BTN
      }).setOrigin(0.5,0);
      c.add([icon, title, theme, dif, phasesTxt]);

      const hit = this.add.zone(0, 0, cardW, cardH).setInteractive();
      hit.on('pointerover', () => drawCard(0xffe88a));
      hit.on('pointerout',  () => drawCard(0xc9a84c));
      c.add(hit);

      const btn = makeButton(this, 0, cardH/2-36, cardW-40, 46, "Selecionar", {
        fill: 0x2d5a2a, stroke: 0xc9a84c, hoverFill: 0x3d7a3a,
        fontSize: 18, fontColor: '#e8ffe0',
        onClick: () => {
          this.scene.stop('UIScene');
          this.scene.stop('GameScene');
          this.scene.stop('GameOverScene');
          this.scene.start('PhaseSelectScene', { stageId: s.id });
        }
      });
      c.add(btn);
      c.sendToBack(cardG);
    });
  }
}

class PhaseSelectScene extends Phaser.Scene {
  constructor() { super('PhaseSelectScene'); }
  init(data) { this.stageId = data.stageId || 0; }

    const p = stage.palette;

    // fundo temático

    bgG.fillStyle(p.fog, 1).fillRect(0,0,W,H);
    bgG.fillStyle(p.bg, 1).fillRect(0,80,W,H-80);
    const stars = this.add.graphics();
    for (let i=0;i<80;i++){
      stars.fillStyle(0xffffff, Phaser.Math.FloatBetween(0.05,0.25));
      stars.fillCircle(Phaser.Math.Between(0,W),Phaser.Math.Between(0,H),Phaser.Math.FloatBetween(0.5,1.5));
    }

    // título
    const titleC = this.add.container(W/2, 70);
    const icon = this.add.text(-220, 0, stage.icon, { fontSize:'52px' }).setOrigin(0.5);
    const t1 = this.add.text(0, 0, stage.name, {
      fontSize:'46px', color:'#f0e0ff', fontFamily: FONT_TITLE, fontStyle:'bold'
    }).setOrigin(0.5);
    t1.setShadow(3, 4, '#000', 8, true, true);
    titleC.add([icon, t1]);

    this.add.text(W/2, 120, stage.theme + " — escolha a fase", {
      fontSize:'18px', color:'#d8d2bf', fontFamily: FONT_TITLE, fontStyle:'italic'
    }).setOrigin(0.5).setShadow(2,2,'#000',3);

      fill: 0x2a1a3a, stroke: 0xc9a84c, hoverFill: 0x4a2a5a,
      fontSize: 14, fontColor: '#e8d8ff',
      onClick: () => { this.scene.start('StageSelectScene'); }

    // cards de fase

    const cardW = 200, cardH = 360, gap = 28;
    const totalW = phases.length*cardW + (phases.length-1)*gap;
    const startX = (W - totalW)/2;

    phases.forEach((ph, i) => {
      const x = startX + i*(cardW+gap);
      const y = 180;
      const c = this.add.container(x + cardW/2, y + cardH/2);

      const cardG = this.add.graphics();
      const drawCard = (border) => {
        cardG.clear();
        cardG.fillStyle(p.mossL, 0.85).fillRoundedRect(-cardW/2, -cardH/2, cardW, cardH, 16);
        cardG.lineStyle(3, border, 1).strokeRoundedRect(-cardW/2, -cardH/2, cardW, cardH, 16);
      };
      drawCard(0xc9a84c);
      c.add(cardG);

      const num = this.add.text(0, -cardH/2+24, `FASE ${i+1}`, {
        fontSize:'16px', color:'#ffe088', fontFamily: FONT_BTN, fontStyle:'bold'
      }).setOrigin(0.5,0);
      const name = this.add.text(0, -cardH/2+50, ph.name, {
        fontSize:'18px', color:'#fff8e0', fontFamily: FONT_TITLE, fontStyle:'bold',
        align:'center', wordWrap:{width:cardW-20}
      }).setOrigin(0.5,0);
      name.setShadow(2,2,'#000',3);

      // dificuldade combinada
      const totalDiff = Math.min(5, stage.baseDifficulty + Math.floor(i/2));
      const stars2 = '★'.repeat(totalDiff) + '☆'.repeat(5-totalDiff);
      const dif = this.add.text(0, -cardH/2+120, stars2, {fontSize:'18px', color:'#ffcc44'}).setOrigin(0.5,0);

        fontSize:'13px', color:'#c8b890', fontFamily: FONT_BTN

      hit.on('pointerout',  () => drawCard(0xc9a84c));

          this.scene.stop('UIScene');
          this.scene.stop('GameScene');

          this.scene.start('GameScene', { stageId: stage.id, phaseId: i });
        }

      c.add(btn);
      c.sendToBack(cardG);
    });
  }

// =================== GAME ===================
class GameScene extends Phaser.Scene {
  constructor() { super('GameScene'); }

  init(data) {
    this.stage = STAGES[data.stageId || 0];
    this.phaseId = data.phaseId || 0;
    this.phase = this.stage.phases[this.phaseId];
    this.PATH = this.phase.path || this.stage.path;
    this.SLOTS = this.phase.slots || this.stage.slots;
    this.WAVES = buildWaves(this.stage, this.phaseId);
  }


  create() {
    this.spawnTimer = null;
    this.slots = [];
    this.activeEnemies = [];
    this.activeProjectiles = [];
    this.towers = [];
    this.selectedTowerType = null;
    this.pendingConfirm = null;
    this.previewGfx = null;
    this.enemies = null;
    this.projectiles = null;
    this.towerGroup = null;
    this.slotGroup = null;
    this._mapGfx = [];
    this.gameOver = false;
    this.waveInProgress = false;
    this.currentWave = 0;
    this.baseHP = 20;
    this.gold = 150 + ((window.TD_MULT && window.TD_MULT.startingGoldBonus) | 0);
    this.state = {
      gold: this.gold, hp: this.baseHP, maxHp: 20,
      wave: this.currentWave, waveActive: this.waveInProgress, enemiesAlive: 0,
      gameOver: this.gameOver, victory: false,
      stageName: this.stage.name, totalWaves: this.WAVES.length,
      phase: this.phaseId + 1, totalPhases: this.stage.phases.length,
      speed: 1, freezeUntil: 0, wallUntil: 0,
    };
    this.handleSpeedChange = this.handleSpeedChange.bind(this);
    this.events.once('shutdown', this.shutdownGame, this);
    this.enemies = this.add.group();
    this.projectiles = this.add.group();
    this.towerGroup = this.add.group();
    this.slotGroup = this.add.group();

    this.drawBackground();
    this.drawPath();
    this.drawBase();
    this.createSlots();

    this.rangeIndicator = this.add.circle(0,0,0, 0x88ddaa, 0.15)
      .setStrokeStyle(2, 0x88ddaa, 0.6).setVisible(false);

    this.fxLayer = this.add.container(0,0);
    this.projectileLayer = this.add.graphics().setDepth(20);

    this.scene.launch('UIScene', { gameScene: this });
    this.events.emit('stateUpdate', this.state);
    this.events.on('startWave', this.startWave, this);
    this.events.on('useItem', this.useItem, this);
    this.events.on('setSpeed', this.handleSpeedChange, this);
  }

  // Recarrega uma nova fase sem reiniciar a cena: limpa mapa, inimigos,
  // torres e slots, e redesenha tudo com o novo path/slots.
  loadPhase(phaseIndex) {
    this.phaseId = phaseIndex;
    this.phase = this.stage.phases[phaseIndex];
    this.PATH = this.phase.path || this.stage.path;
    this.SLOTS = this.phase.slots || this.stage.slots;
    this.WAVES = buildWaves(this.stage, phaseIndex);

    // limpa entidades dinâmicas
    if (this.spawnTimer) { try { this.spawnTimer.remove(false); } catch(_){} this.spawnTimer = null; }
    for (const e of this.activeEnemies) if (e.container && e.container.scene) e.container.destroy();
    for (const p of this.activeProjectiles) if (p.gfx && p.gfx.scene) p.gfx.destroy();
    this.activeEnemies = [];
    this.activeProjectiles = [];
    if (this.projectileLayer && this.projectileLayer.scene) this.projectileLayer.clear();

    // cancela confirmação pendente e remove preview antes de destruir slots/torres
    this.clearPendingConfirm();
    this.clearPreview();

    // limpa torres e slots (novas posições)
    for (const t of this.towers) if (t.container && t.container.scene) t.container.destroy();
    this.towers = [];
    for (const s of this.slots) if (s.container && s.container.scene) s.container.destroy();
    this.slots = [];

    // limpa mapa (bg, caminho, base)
    for (const g of (this._mapGfx || [])) if (g && g.scene) g.destroy();
    this._mapGfx = [];
    if (this.baseSprite && this.baseSprite.scene) { this.baseSprite.destroy(); this.baseSprite = null; }

    // redesenha
    this.drawBackground();
    this.drawPath();
    this.drawBase();
    this.createSlots();

    // reset de estado de onda; ouro é redefinido para o valor inicial base
    // (ouro acumulado da fase anterior é descartado ao trocar de fase).
    this.gold = 150 + ((window.TD_MULT && window.TD_MULT.startingGoldBonus) | 0);
    this.state.gold = this.gold;
    // reset dos upgrades ativados: cada fase recomeça com nenhum ativo.
    window.TD_ACTIVE_UPGRADES = {};
    this.currentWave = 0;
    this.state.wave = 0;
    this.state.waveActive = false;
    this.state.victory = false;
    this.state.enemiesAlive = 0;
    this.state.totalWaves = this.WAVES.length;
    this.state.phase = phaseIndex + 1;
    this.state.totalPhases = this.stage.phases.length;
    this.state.stageName = this.stage.name;

    const ui = this.scene.get('UIScene');
    if (ui && ui.updateStageTitle) ui.updateStageTitle();
    if (ui && ui.refreshUpgradePanel) ui.refreshUpgradePanel();
    this.events.emit('stateUpdate', this.state);
  }

  handleSpeedChange(v) {
    this.state.speed = v;
    if (this.spawnTimer) this.spawnTimer.timeScale = v;
  }

  shutdownGame() {
    this.clearPendingConfirm();
    this.clearPreview();
    this.events.off('startWave', this.startWave, this);
    this.events.off('useItem', this.useItem, this);
    this.events.off('setSpeed', this.handleSpeedChange, this);
    this.tweens.killAll();
    this.time.removeAllEvents();
    try { if (this.physics && this.physics.world && this.physics.world.shutdown) this.physics.world.shutdown(); } catch (_) {}
    this.clearGroup(this.enemies);
    this.clearGroup(this.projectiles);
    this.clearGroup(this.towerGroup);
    this.clearGroup(this.slotGroup);
    for (const e of this.activeEnemies || []) if (e.container && e.container.scene) e.container.destroy();
    for (const t of this.towers || []) if (t.container && t.container.scene) t.container.destroy();
    for (const s of this.slots || []) if (s.container && s.container.scene) s.container.destroy();
    if (this.projectileLayer && this.projectileLayer.scene) this.projectileLayer.destroy();
    if (this.rangeIndicator && this.rangeIndicator.scene) this.rangeIndicator.destroy();
    this.activeEnemies = [];
    this.activeProjectiles = [];
    this.towers = [];
    this.slots = [];
    this.spawnTimer = null;
    // reset upgrades ativados ao encerrar a partida.
    window.TD_ACTIVE_UPGRADES = {};
  }

  clearGroup(group) {
    if (!group) return;
    try { if (group.clear) group.clear(true, true); }
    catch (_) { try { if (group.destroy) group.destroy(); } catch (_) {} }
  }

  exitToGameOver(data) {
    try {
      const s = this.state || {};
      window.TD_POST && window.TD_POST({
        type: 'td:stageComplete',
        wave: s.wave | 0,
        gold: s.gold | 0,
        victory: !!(data && data.victory),
        stage: this.stage && this.stage.name,
        phase: this.phase && this.phase.name,
      });
    } catch (_) {}
    const payload = Object.assign({}, data, {
      stageId: this.stage.id,
      phaseId: this.phaseId,
      phaseName: this.phase && this.phase.name,
      hasNext: this.phaseId < this.stage.phases.length - 1,
    });
    this.scene.stop('UIScene');
    this.scene.stop('GameScene');
    this.scene.start('GameOverScene', payload);
  }

  // ---------- arte ----------
  drawBackground() {
    const p = this.stage.palette;
    if (!this._mapGfx) this._mapGfx = [];
    const g = this.add.graphics();
    g.fillStyle(p.fog,1).fillRect(0,0,W,H);
    g.fillStyle(p.bg,1).fillRect(0,80,W,H-80);
    this._mapGfx.push(g);

    const m1 = this.add.graphics();
    m1.fillStyle(p.mtn, 0.55);
    this.drawMountains(m1, 180, 80, 6);
    const m2 = this.add.graphics();
    m2.fillStyle(p.mtn, 0.85);
    this.drawMountains(m2, 230, 60, 8);
    this.parallax1 = m1; this.parallax2 = m2;
    this._mapGfx.push(m1, m2);

    const grass = this.add.graphics();
    for (let i=0;i<260;i++){
      grass.fillStyle(p.moss, Phaser.Math.FloatBetween(0.18,0.4));
      grass.fillCircle(Phaser.Math.Between(0,W), Phaser.Math.Between(0,H), Phaser.Math.Between(20,90));
    }
    for (let i=0;i<400;i++){
      grass.fillStyle(p.mossL, Phaser.Math.FloatBetween(0.2,0.5));
      grass.fillCircle(Phaser.Math.Between(0,W), Phaser.Math.Between(0,H), Phaser.Math.Between(2,5));
    }
    this._mapGfx.push(grass);
  }
  drawMountains(g, baseY, h, n) {
    const step = W/n;
    g.beginPath();
    g.moveTo(0, baseY+h);
    for (let i=0;i<=n;i++) {
      const x = i*step;
      const y = baseY - Math.abs(Math.sin(i*1.3))*h;
      g.lineTo(x,y);
    }
    g.lineTo(W, baseY+h);
    g.closePath();
    g.fillPath();
  }

  drawPath() {
    const p = this.stage.palette;
    if (!this._mapGfx) this._mapGfx = [];
    const g = this.add.graphics();
    g.lineStyle(56, p.pathEdge, 1);
    this.strokePath(g);
    g.lineStyle(46, p.path, 1);
    this.strokePath(g);
    g.fillStyle(0x000000, 0.2);
    for (let i=0;i<this.PATH.length-1;i++){
      const a=this.PATH[i], b=this.PATH[i+1];
      const d=Math.hypot(b.x-a.x,b.y-a.y);
      const steps=Math.floor(d/14);
      for (let s=0;s<steps;s++){
        const t=s/steps;
        const x=a.x+(b.x-a.x)*t + Phaser.Math.Between(-12,12);
        const y=a.y+(b.y-a.y)*t + Phaser.Math.Between(-12,12);
        g.fillCircle(x,y,Phaser.Math.Between(2,4));
      }
    }
    this._mapGfx.push(g);
  }
  strokePath(g) {
    g.beginPath();
    g.moveTo(this.PATH[0].x, this.PATH[0].y);
    for (let i=1;i<this.PATH.length;i++) g.lineTo(this.PATH[i].x, this.PATH[i].y);
    g.strokePath();
  }

  drawBase() {
    const last = this.PATH[this.PATH.length-1];
    const bx = last.x + (last.x > W/2 ? -10 : 10), by = last.y;
    this.baseSprite = this.add.container(bx, by);
    const glow = this.add.circle(0,0,50, 0x9a5fbf, 0.25);
    const tower = this.add.rectangle(0,0,52,72, 0x6a3a8a).setStrokeStyle(2, 0x2a1438);
    const top = this.add.triangle(0,-46, -28,0, 28,0, 0,-22, 0x4a2870);
    const rune = this.add.text(0,0,"⚜", {fontSize:'28px', color:'#ffd9ff'}).setOrigin(0.5);
    this.baseSprite.add([glow, tower, top, rune]);
    this.tweens.add({ targets: glow, scale: 1.25, alpha: 0.45, yoyo:true, repeat:-1, duration:1400 });
  }

  createSlots() {
    this.slots = this.SLOTS.map((s, i) => {
      const c = this.add.container(s.x, s.y);
      const ring = this.add.circle(0,0,22, 0x5a4a30, 0.45).setStrokeStyle(2, 0x9c8456, 0.8);
      const cross = this.add.text(0,0,"+", {fontSize:'22px', color:'#d8c89a', fontStyle:'bold'}).setOrigin(0.5);
      c.add([ring, cross]);
      c.setSize(50,50).setInteractive({ useHandCursor: true });
      c.on('pointerover', () => {
        ring.setFillStyle(0x9c8456, 0.6);
        const slot = this.slots[i];
        if (this.selectedTowerType && !slot.tower && !this.pendingConfirm) {
          this.showPreview(i, this.selectedTowerType);
        }
      });
      c.on('pointerout', () => {
        ring.setFillStyle(0x5a4a30, 0.45);
        if (!this.pendingConfirm) this.clearPreview();
      });
      c.on('pointerdown', () => this.handleSlotClick(i));
      this.slotGroup.add(c);
      return { x: s.x, y: s.y, container: c, tower: null, ring, cross };
    });
  }

  setSelectedTowerType(typeKey) {
    this.selectedTowerType = (this.selectedTowerType === typeKey) ? null : typeKey;
    this.clearPendingConfirm();
    this.clearPreview();
    this.events.emit('towerSelectionChanged', this.selectedTowerType);
  }

  handleSlotClick(slotIndex) {
    const slot = this.slots[slotIndex];
    if (!slot) return;
    if (this.pendingConfirm && this.pendingConfirm.slotIndex !== slotIndex) {
      this.clearPendingConfirm();
    }
    if (slot.tower) {
      this.showReplaceConfirm(slotIndex);
    } else {
      if (!this.selectedTowerType) return;
      const def = TOWER_TYPES[this.selectedTowerType];
      if (!def || this.state.gold < def.cost) return;
      this.showBuildConfirm(slotIndex, this.selectedTowerType);
    }
  }

  showPreview(slotIndex, typeKey) {
    this.clearPreview();
    const slot = this.slots[slotIndex];
    const def = TOWER_TYPES[typeKey];
    if (!slot || !def) return;
    const rangeMul = window.getActiveMult('range', typeKey);
    const r = def.range * rangeMul;
    const ring = this.add.circle(slot.x, slot.y, r, def.color, 0.2)
      .setStrokeStyle(2, def.color, 0.7).setDepth(15);
    const ghost = this.add.circle(slot.x, slot.y, 18, def.color, 1)
      .setStrokeStyle(2, 0xffffff, 0.9).setAlpha(0.4).setDepth(16);
    this.previewGfx = { ring, ghost };
  }

  clearPreview() {
    if (!this.previewGfx) return;
    if (this.previewGfx.ring && this.previewGfx.ring.scene) this.previewGfx.ring.destroy();
    if (this.previewGfx.ghost && this.previewGfx.ghost.scene) this.previewGfx.ghost.destroy();
    this.previewGfx = null;
  }

  _makeConfirmBtn(x, y, label, color, onClick) {
    const c = this.add.container(x, y).setDepth(18);
    const bg = this.add.circle(0, 0, 18, color, 0.95).setStrokeStyle(2, 0xffffff, 0.95);
    const t = this.add.text(0, 0, label, { fontSize: '18px', color: '#ffffff', fontStyle: 'bold' }).setOrigin(0.5);
    c.add([bg, t]);
    c.setSize(40, 40).setInteractive({ useHandCursor: true });
    c.on('pointerover', () => bg.setScale(1.15));
    c.on('pointerout', () => bg.setScale(1));
    c.on('pointerdown', (_p, _lx, _ly, ev) => { if (ev && ev.stopPropagation) ev.stopPropagation(); onClick(); });
    return c;
  }

  showBuildConfirm(slotIndex, typeKey) {
    this.clearPendingConfirm();
    this.showPreview(slotIndex, typeKey);
    const slot = this.slots[slotIndex];
    const blocker = this.add.rectangle(0, 0, W, H, 0x000, 0.0001).setOrigin(0).setDepth(17).setInteractive();
    blocker.on('pointerdown', () => this.clearPendingConfirm());
    const yes = this._makeConfirmBtn(slot.x - 28, slot.y - 44, '✔', 0x2d6a3a, () => {
      const key = typeKey;
      this.clearPendingConfirm();
      this.buildTower(slotIndex, key);
    });
    const no = this._makeConfirmBtn(slot.x + 28, slot.y - 44, '✖', 0x8a2a2a, () => this.clearPendingConfirm());
    this.pendingConfirm = { slotIndex, kind: 'build', yes, no, blocker };
  }

  showReplaceConfirm(slotIndex) {
    this.clearPendingConfirm();
    const slot = this.slots[slotIndex];
    const blocker = this.add.rectangle(0, 0, W, H, 0x000, 0.0001).setOrigin(0).setDepth(17).setInteractive();
    blocker.on('pointerdown', () => this.clearPendingConfirm());
    const swap = this._makeConfirmBtn(slot.x - 28, slot.y - 44, '🔄', 0x1a4a8a, () => {
      this.clearPendingConfirm();
      this.refundTower(slotIndex);
    });
    const cancel = this._makeConfirmBtn(slot.x + 28, slot.y - 44, '✖', 0x555555, () => this.clearPendingConfirm());
    this.pendingConfirm = { slotIndex, kind: 'replace', yes: swap, no: cancel, blocker };
  }

  clearPendingConfirm() {
    const p = this.pendingConfirm;
    this.pendingConfirm = null;
    if (p) {
      for (const k of ['yes', 'no', 'blocker']) {
        if (p[k] && p[k].scene) p[k].destroy();
      }
    }
    this.clearPreview();
  }

  refundTower(slotIndex) {
    const slot = this.slots[slotIndex];
    if (!slot || !slot.tower) return;
    const cost = slot.tower.def.cost;
    this.state.gold += Math.floor(cost * 0.5);
    if (slot.tower.container && slot.tower.container.scene) slot.tower.container.destroy();
    this.towers = this.towers.filter(t => t !== slot.tower);
    slot.tower = null;
    slot.container.setInteractive({ useHandCursor: true });
    slot.ring.setVisible(true);
    slot.cross.setVisible(true);
    this.events.emit('stateUpdate', this.state);
  }


  buildTower(slotIndex, typeKey) {
    const slot = this.slots[slotIndex];
    const def = TOWER_TYPES[typeKey];
    if (!def || slot.tower || this.state.gold < def.cost) return;
    this.state.gold -= def.cost;

    slot.container.disableInteractive();
    slot.ring.setVisible(false); slot.cross.setVisible(false);

    const c = this.add.container(slot.x, slot.y);

    // sombra projetada no chão
    const shadow = this.add.ellipse(0, 18, 42, 12, 0x000000, 0.45);
    c.add(shadow);

    // base octogonal/trapezoidal/cilíndrica + topo distinto
    const g = this.add.graphics();
    let topPart = null;
    let flashPos = { x: 0, y: -18 };

    if (typeKey === 'archer') {
      // base octogonal verde-esmeralda
      const oct = [];
      for (let i=0;i<8;i++){
        const a = (Math.PI*2*i/8) + Math.PI/8;
        oct.push(Math.cos(a)*18, Math.sin(a)*7 + 8);
      }
      g.fillStyle(0x1a3328, 1).fillPoints(oct.map((v,i)=>({x:v, y: oct[i+1]})).filter((_,i)=>i%2===0), true);
      g.fillStyle(0x2d6a4f, 1);
      g.beginPath();
      for (let i=0;i<oct.length;i+=2){
        if (i===0) g.moveTo(oct[i], oct[i+1]-4);
        else g.lineTo(oct[i], oct[i+1]-4);
      }
      g.closePath().fillPath();
      g.lineStyle(1, 0x0d1a14, 1).strokePath();
      // corpo cilíndrico fino
      g.fillStyle(0x2d6a4f, 1).fillRect(-7, -18, 14, 22);
      g.lineStyle(1, 0x0d1a14, 1).strokeRect(-7, -18, 14, 22);
      // topo em ponta élfica com 2 orelhas
      g.fillStyle(0x3d8a6a, 1);
      g.beginPath();
      g.moveTo(-9, -18); g.lineTo(0, -34); g.lineTo(9, -18); g.closePath().fillPath();
      g.lineStyle(1, 0x0d1a14, 1).strokePath();
      // orelhas
      g.fillStyle(0x2d6a4f, 1);
      g.fillTriangle(-11, -20, -16, -28, -7, -22);
      g.fillTriangle( 11, -20,  16, -28,  7, -22);
      // gema dourada
      g.fillStyle(0xffd700, 1).fillCircle(0, -22, 3);
      g.lineStyle(1, 0xffffff, 0.7).strokeCircle(0, -22, 3);
      c.add(g);
      topPart = this.add.circle(0, -22, 4, 0xffd700, 0).setStrokeStyle(1.5, 0xffffaa, 0.9);
      c.add(topPart);
      this.tweens.add({ targets: topPart, scale: 1.4, alpha: 0.4, yoyo: true, repeat: -1, duration: 1100 });
      flashPos = { x: 0, y: -22 };

    } else if (typeKey === 'dwarf') {
      // base trapezoidal larga em granito
      g.fillStyle(0x2a2a2a, 1);
      g.beginPath();
      g.moveTo(-22, 14); g.lineTo(22, 14); g.lineTo(18, -10); g.lineTo(-18, -10);
      g.closePath().fillPath();
      g.lineStyle(1.5, 0x111111, 1).strokePath();
      g.fillStyle(0x4a4a4a, 1);
      g.beginPath();
      g.moveTo(-20, 12); g.lineTo(20, 12); g.lineTo(16, -8); g.lineTo(-16, -8);
      g.closePath().fillPath();
      // linhas de blocos
      g.lineStyle(1, 0x2a2a2a, 0.8);
      g.beginLine = true;
      for (const yy of [-2, 6]) {
        g.beginPath(); g.moveTo(-18, yy); g.lineTo(18, yy); g.strokePath();
      }
      for (const xx of [-10, 0, 10]) {
        g.beginPath(); g.moveTo(xx, -8); g.lineTo(xx, 12); g.strokePath();
      }
      // torre central
      g.fillStyle(0x5a5a5a, 1).fillRect(-12, -22, 24, 14);
      g.lineStyle(1, 0x1a1a1a, 1).strokeRect(-12, -22, 24, 14);
      // 3 ameias no topo
      for (const ax of [-12, -3, 6]) {
        g.fillStyle(0x4a4a4a, 1).fillRect(ax, -28, 6, 6);
        g.lineStyle(1, 0x1a1a1a, 1).strokeRect(ax, -28, 6, 6);
      }
      // forja acesa
      g.fillStyle(0xff7a1a, 1).fillCircle(0, -14, 4);
      g.fillStyle(0xffdd66, 0.8).fillCircle(0, -14, 2);
      c.add(g);
      topPart = this.add.circle(0, -14, 5, 0xff7a1a, 0).setStrokeStyle(2, 0xffaa44, 0.7);
      c.add(topPart);
      this.tweens.add({ targets: topPart, scale: 1.5, alpha: 0.3, yoyo: true, repeat: -1, duration: 700 });
      flashPos = { x: 0, y: -14 };

    } else if (typeKey === 'mage') {
      // base cilíndrica roxa
      g.fillStyle(0x3a0858, 1).fillEllipse(0, 12, 36, 12);
      g.fillStyle(0x6a0dad, 1).fillRect(-13, -14, 26, 26);
      g.lineStyle(1.5, 0x2a0844, 1).strokeRect(-13, -14, 26, 26);
      // runas (losangos) ao redor
      g.fillStyle(0xc89cff, 1);
      for (const rx of [-13, 13]) {
        for (const ry of [-6, 6]) {
          g.fillTriangle(rx, ry-3, rx+3, ry, rx, ry+3);
          g.fillTriangle(rx, ry-3, rx-3, ry, rx, ry+3);
        }
      }
      // topo cônico
      g.fillStyle(0x4a0a78, 1);
      g.fillTriangle(-14, -14, 14, -14, 0, -34);
      g.lineStyle(1, 0x2a0844, 1).strokePath();
      // gema topo
      g.fillStyle(0xffd700, 1).fillCircle(0, -32, 3);
      c.add(g);
      // aura pulsante
      const aura = this.add.circle(0, -4, 24, 0xc89cff, 0.18);
      c.addAt(aura, 1);
      this.tweens.add({ targets: aura, scale: 1.3, alpha: 0.05, yoyo: true, repeat: -1, duration: 1200 });
      topPart = aura;
      flashPos = { x: 0, y: -10 };
    }

    c.setSize(50,50).setInteractive({ useHandCursor: true });

    const tower = { x: slot.x, y: slot.y, type: typeKey, def, container: c, lastFire: 0, target: null, flashPos };
    slot.tower = tower;
    this.towers.push(tower);
    this.towerGroup.add(c);

    c.on('pointerover', () => this.rangeIndicator.setPosition(slot.x, slot.y).setRadius(def.range).setVisible(true));
    c.on('pointerout', () => this.rangeIndicator.setVisible(false));
    c.on('pointerdown', () => this.handleSlotClick(slotIndex));
    this.events.emit('stateUpdate', this.state);
  }


  // ---------- ondas ----------
  startWave() {
    if (this.state.waveActive || this.state.gameOver || this.state.victory) return;
    if (this.state.wave >= this.WAVES.length) return;
    const wave = this.WAVES[this.state.wave];
    this.state.wave++;
    this.state.waveActive = true;
    this.spawnTimer = this.time.addEvent({
      delay: wave.interval, repeat: wave.count - 1,
      callback: () => this.spawnEnemy(wave),
    });
    this.spawnTimer.timeScale = this.state.speed;
    this.events.emit('stateUpdate', this.state);
  }

  spawnEnemy(wave) {
    const t = ENEMY_TYPES[wave.type];
    const start = this.PATH[0];
    const c = this.add.container(start.x, start.y);
    const sz = t.size;
    let body;

    // sombra no chão
    const shadow = this.add.ellipse(0, sz/2+2, sz*0.9, sz*0.35, 0x000000, 0.45);
    c.add(shadow);

    if (wave.type === 'orc') {
      // corpo oval verde-musgo
      body = this.add.ellipse(0, 2, sz*0.95, sz*1.05, 0x556b2f).setStrokeStyle(2, 0x2a3318);
      // cabeça redonda
      const head = this.add.circle(0, -sz*0.4, sz*0.42, 0x6b8a3a).setStrokeStyle(2, 0x2a3318);
      // olhos vermelhos pontudos
      const eye1 = this.add.triangle(-sz*0.18, -sz*0.42, -3,-2, 3,-2, 0,3, 0xff3322);
      const eye2 = this.add.triangle( sz*0.18, -sz*0.42, -3,-2, 3,-2, 0,3, 0xff3322);
      // presas
      const fang1 = this.add.triangle(-sz*0.12, -sz*0.22, -2,-3, 2,-3, 0,4, 0xffffff);
      const fang2 = this.add.triangle( sz*0.12, -sz*0.22, -2,-3, 2,-3, 0,4, 0xffffff);
      c.add([body, head, eye1, eye2, fang1, fang2]);
      // animação de corrida — anima o body (filho), não o container, para não conflitar com o movimento de path
      this.tweens.add({ targets: body, y: '+=2', yoyo: true, repeat: -1, duration: 180, ease: 'Sine.inOut' });

    } else if (wave.type === 'troll') {
      // corpo quadrado grande
      body = this.add.rectangle(0, 2, sz*1.05, sz*1.1, 0x3d3d3d).setStrokeStyle(3, 0x1a1a1a);
      // ombros largos (cantos)
      const sh1 = this.add.rectangle(-sz*0.55, -sz*0.2, sz*0.3, sz*0.3, 0x2a2a2a).setStrokeStyle(2, 0x111);
      const sh2 = this.add.rectangle( sz*0.55, -sz*0.2, sz*0.3, sz*0.3, 0x2a2a2a).setStrokeStyle(2, 0x111);
      // armadura no torso
      const armorG = this.add.graphics();
      armorG.lineStyle(2, 0x6a6a6a, 1);
      armorG.strokeRect(-sz*0.3, -sz*0.15, sz*0.6, sz*0.5);
      armorG.beginPath(); armorG.moveTo(0, -sz*0.15); armorG.lineTo(0, sz*0.35); armorG.strokePath();
      armorG.beginPath(); armorG.moveTo(-sz*0.3, sz*0.1); armorG.lineTo(sz*0.3, sz*0.1); armorG.strokePath();
      // olhos amarelos
      const eye1 = this.add.circle(-sz*0.2, -sz*0.32, 2.5, 0xffe044);
      const eye2 = this.add.circle( sz*0.2, -sz*0.32, 2.5, 0xffe044);
      c.add([body, sh1, sh2, armorG, eye1, eye2]);
      // pisada pesada
      this.tweens.add({ targets: c, scaleY: 0.95, yoyo: true, repeat: -1, duration: 420, ease: 'Sine.inOut' });

    } else if (wave.type === 'wraith') {
      const halo = this.add.ellipse(0, -2, sz*1.6, sz*1.9, 0x6a3a8a, 0.25);
      body = this.add.ellipse(0, -3, sz, sz*1.25, 0x4a1a6a).setStrokeStyle(2, 0x8a4abf);
      body.setAlpha(0.75);
      const skull = this.add.text(0, -4, "☠", { fontSize:'14px', color:'#e8d8ff' }).setOrigin(0.5);
      skull.setShadow(0, 0, '#ffaaff', 6);
      c.add([halo, body, skull]);
      this.tweens.add({ targets: halo, alpha: 0.1, scale: 1.15, yoyo: true, repeat: -1, duration: 900 });
      this.tweens.add({ targets: body, alpha: 0.45, yoyo: true, repeat: -1, duration: 700 });
      this.tweens.add({ targets: body, y: '+=4', yoyo: true, repeat: -1, duration: 800, ease: 'Sine.inOut' });

    } else if (wave.type === 'goblin') {
      // goblin pequeno e rápido, verde claro
      body = this.add.ellipse(0, 2, sz*0.85, sz*0.95, 0x6aa845).setStrokeStyle(2, 0x2a4a18);
      const head = this.add.circle(0, -sz*0.35, sz*0.35, 0x80c050).setStrokeStyle(2, 0x2a4a18);
      const ear1 = this.add.triangle(-sz*0.35, -sz*0.45, 0,0, 8,-8, 4,6, 0x6aa845).setStrokeStyle(1, 0x2a4a18);
      const ear2 = this.add.triangle( sz*0.35, -sz*0.45, 0,0, -8,-8, -4,6, 0x6aa845).setStrokeStyle(1, 0x2a4a18);
      const eye1 = this.add.circle(-sz*0.13, -sz*0.35, 2, 0xffff00);
      const eye2 = this.add.circle( sz*0.13, -sz*0.35, 2, 0xffff00);
      c.add([body, head, ear1, ear2, eye1, eye2]);
      this.tweens.add({ targets: body, scaleY: 0.88, yoyo: true, repeat: -1, duration: 140, ease: 'Sine.inOut' });

    } else if (wave.type === 'golem') {
      // golem de areia, blocos pedregosos
      body = this.add.rectangle(0, 2, sz*1.1, sz*1.15, 0xb8945a).setStrokeStyle(3, 0x5a3a18);
      const head = this.add.rectangle(0, -sz*0.5, sz*0.6, sz*0.5, 0xd0a868).setStrokeStyle(2, 0x5a3a18);
      const crack = this.add.graphics();
      crack.lineStyle(2, 0x6a4a20, 0.8);
      crack.beginPath(); crack.moveTo(-sz*0.3, -sz*0.1); crack.lineTo(0, sz*0.1); crack.lineTo(sz*0.25, 0); crack.strokePath();
      const eye1 = this.add.circle(-sz*0.12, -sz*0.5, 2.5, 0xffaa22);
      const eye2 = this.add.circle( sz*0.12, -sz*0.5, 2.5, 0xffaa22);
      c.add([body, head, crack, eye1, eye2]);
      this.tweens.add({ targets: c, scaleY: 0.96, yoyo: true, repeat: -1, duration: 520, ease: 'Sine.inOut' });

    } else if (wave.type === 'imp') {
      // diabrete flamejante
      const flame = this.add.ellipse(0, -2, sz*1.4, sz*1.6, 0xff4400, 0.35);
      body = this.add.ellipse(0, 2, sz*0.9, sz*1.0, 0xc02a10).setStrokeStyle(2, 0x4a0a00);
      const horn1 = this.add.triangle(-sz*0.2, -sz*0.5, 0,0, 4,-10, -4,-2, 0x2a0a00);
      const horn2 = this.add.triangle( sz*0.2, -sz*0.5, 0,0, -4,-10, 4,-2, 0x2a0a00);
      const eye1 = this.add.circle(-sz*0.15, -sz*0.25, 2.5, 0xffee00);
      const eye2 = this.add.circle( sz*0.15, -sz*0.25, 2.5, 0xffee00);
      c.add([flame, body, horn1, horn2, eye1, eye2]);
      this.tweens.add({ targets: flame, alpha: 0.15, scale: 1.2, yoyo: true, repeat: -1, duration: 350 });
      this.tweens.add({ targets: body, y: '+=2', yoyo: true, repeat: -1, duration: 200, ease: 'Sine.inOut' });

    } else if (wave.type === 'harpy') {
      // harpia voadora — asas
      const wingL = this.add.triangle(-sz*0.7, -sz*0.1, 0,0, sz*0.7,-sz*0.2, sz*0.7,sz*0.3, 0xa8c8ff).setStrokeStyle(2, 0x405878);
      const wingR = this.add.triangle( sz*0.7, -sz*0.1, 0,0, -sz*0.7,-sz*0.2, -sz*0.7,sz*0.3, 0xa8c8ff).setStrokeStyle(2, 0x405878);
      body = this.add.ellipse(0, 0, sz*0.7, sz*0.95, 0xc0d8ff).setStrokeStyle(2, 0x405878);
      const head = this.add.circle(0, -sz*0.45, sz*0.3, 0xe0e8ff).setStrokeStyle(2, 0x405878);
      const beak = this.add.triangle(0, -sz*0.38, -2,0, 2,0, 0,7, 0xffaa44);
      const eye1 = this.add.circle(-sz*0.08, -sz*0.5, 1.8, 0x000);
      const eye2 = this.add.circle( sz*0.08, -sz*0.5, 1.8, 0x000);
      c.add([wingL, wingR, body, head, beak, eye1, eye2]);
      this.tweens.add({ targets: [wingL, wingR], scaleY: 0.55, yoyo: true, repeat: -1, duration: 220, ease: 'Sine.inOut' });
      this.tweens.add({ targets: body, y: '-=5', yoyo: true, repeat: -1, duration: 600, ease: 'Sine.inOut' });

    } else if (wave.type === 'demon') {
      // demônio maior — vermelho com chifres e olhos brilhantes
      const aura = this.add.ellipse(0, 0, sz*1.5, sz*1.7, 0xff0000, 0.18);
      body = this.add.ellipse(0, 2, sz*1.0, sz*1.15, 0x6a0a0a).setStrokeStyle(3, 0x2a0000);
      const head = this.add.circle(0, -sz*0.45, sz*0.42, 0x8a1010).setStrokeStyle(2, 0x2a0000);
      const horn1 = this.add.triangle(-sz*0.28, -sz*0.62, 0,0, 6,-14, -3,-3, 0x1a0000);
      const horn2 = this.add.triangle( sz*0.28, -sz*0.62, 0,0, -6,-14, 3,-3, 0x1a0000);
      const eye1 = this.add.circle(-sz*0.15, -sz*0.45, 3, 0xffee00);
      const eye2 = this.add.circle( sz*0.15, -sz*0.45, 3, 0xffee00);
      eye1.setStrokeStyle(1, 0xff0000); eye2.setStrokeStyle(1, 0xff0000);
      const fang1 = this.add.triangle(-sz*0.1, -sz*0.28, -2,-4, 2,-4, 0,6, 0xffffff);
      const fang2 = this.add.triangle( sz*0.1, -sz*0.28, -2,-4, 2,-4, 0,6, 0xffffff);
      c.add([aura, body, head, horn1, horn2, eye1, eye2, fang1, fang2]);
      this.tweens.add({ targets: aura, alpha: 0.08, scale: 1.2, yoyo: true, repeat: -1, duration: 700 });
      this.tweens.add({ targets: c, scaleY: 0.97, yoyo: true, repeat: -1, duration: 480, ease: 'Sine.inOut' });

    } else {
      // fallback genérico
      body = this.add.circle(0, 0, sz*0.5, t.color).setStrokeStyle(2, 0x000);
      c.add(body);
    }


    // HP bar arredondada via Graphics
    const hpW = sz + 8, hpH = 6, hpY = -sz/2 - 10;
    const hpG = this.add.graphics();
    const drawHp = (ratio) => {
      hpG.clear();
      hpG.fillStyle(0x111111, 0.85).fillRoundedRect(-hpW/2, hpY, hpW, hpH, 3);
      hpG.lineStyle(1, 0x000000, 1).strokeRoundedRect(-hpW/2, hpY, hpW, hpH, 3);
      const fillW = Math.max(0, hpW * ratio);
      if (fillW > 1) hpG.fillStyle(hpColor(ratio), 1).fillRoundedRect(-hpW/2+1, hpY+1, fillW-2, hpH-2, 2);
    };
    drawHp(1);
    c.add(hpG);

    const enemy = {
      container: c, body, type: wave.type, typeDef: t,
      hp: wave.hp, maxHp: wave.hp, speed: wave.speed,
      pathIndex: 1, alive: true, reward: t.reward,
      hpG, drawHp,
      // hpBar shim para compat: drawHp ainda funciona; mantemos prop p/ legado
      hpBar: { width: hpW }, hpBarW: hpW,
    };
    this.activeEnemies.push(enemy);
    this.enemies.add(c);
    this.state.enemiesAlive++;
  }


  // ---------- itens ----------
  useItem(key) {
    const ui = this.scene.get('UIScene');
    const item = ui.items[key];
    const now = this.time.now;
    if (item.until > now) return; // cooldown
    if (this.state.gold < item.cost) return;
    this.state.gold -= item.cost;
    item.until = now + item.cooldown;

    if (key === 'fire') {
      this.cameras.main.flash(200, 200, 80, 0);
      const overlay = this.add.rectangle(W/2,H/2,W,H, 0xff4400, 0.25);
      this.tweens.add({ targets: overlay, alpha:0, duration:3000, onComplete:()=>overlay.destroy() });
      // dano em área a cada 300ms por 3s
      let ticks = 0;
      const ev = this.time.addEvent({ delay: 300, repeat: 9, callback: () => {
        for (const e of this.activeEnemies) {
          if (!e.alive) continue;
          this.spawnSpark(e.container.x, e.container.y, 0xff8844, 4);
          this.hitEnemy(e, 25);
        }
        ticks++;
      }});
    } else if (key === 'ice') {
      this.state.freezeUntil = now + 4000;
      this.cameras.main.flash(150, 100, 200, 255);
      const overlay = this.add.rectangle(W/2,H/2,W,H, 0x88ccff, 0.3);
      this.tweens.add({ targets: overlay, alpha:0, duration:4000, onComplete:()=>overlay.destroy() });
      for (const e of this.activeEnemies) if (e.alive) e.body.setTint && e.body.setTint(0x88ccff);
    } else if (key === 'lightning') {
      const sorted = this.activeEnemies.filter(e=>e.alive).sort((a,b)=>a.hp-b.hp).slice(0,5);
      let prev = { x: W/2, y: 0 };
      sorted.forEach((e,i) => {
        this.time.delayedCall(i*80, () => {
          if (!e.alive) return;
          const line = this.add.line(0,0, prev.x, prev.y, e.container.x, e.container.y, 0xffffaa).setOrigin(0,0).setLineWidth(3);
          this.tweens.add({ targets: line, alpha:0, duration:300, onComplete:()=>line.destroy() });
          this.spawnSpark(e.container.x, e.container.y, 0xffff88, 8);
          this.hitEnemy(e, 99999);
          prev = { x: e.container.x, y: e.container.y };
        });
      });
    } else if (key === 'wall') {
      this.state.wallUntil = now + 6000;
      const mid = this.PATH[Math.floor(this.PATH.length/2)];
      const wall = this.add.rectangle(mid.x, mid.y, 60, 60, 0x888888).setStrokeStyle(3, 0x444);
      this.tweens.add({ targets: wall, alpha:0, duration:6000, onComplete:()=>wall.destroy() });
    } else if (key === 'gold') {
      this.state.gold += 100;
      const t = this.add.text(W/2, H/2, "+100 OURO", {fontSize:'48px', color:'#ffcc44', fontStyle:'bold'}).setOrigin(0.5);
      this.tweens.add({ targets: t, y: H/2-80, alpha:0, duration:1500, onComplete:()=>t.destroy() });
    }
    this.events.emit('stateUpdate', this.state);
  }

  spawnSpark(x, y, color, n) {
    for (let i=0;i<n;i++){
      const ang = Math.random()*Math.PI*2;
      const sp = 60 + Math.random()*120;
      const p = this.add.circle(x,y,3,color);
      const dx = Math.cos(ang)*sp, dy = Math.sin(ang)*sp;
      this.tweens.add({ targets: p, x: x+dx, y: y+dy, alpha:0, scale:0.2, duration: 500, onComplete:()=>p.destroy() });
    }
  }

  // ---------- update ----------
  update(time, delta) {
    if (this.state.gameOver || this.state.victory) return;
    const dt = (delta/1000) * this.state.speed;
    this.projectileLayer.clear();

    // parallax
    if (this.parallax1) this.parallax1.x = Math.sin(time*0.00005)*8;
    if (this.parallax2) this.parallax2.x = Math.sin(time*0.0001)*15;

    const frozen = time < this.state.freezeUntil;
    const wallActive = time < this.state.wallUntil;
    const wallIdx = Math.floor(this.PATH.length/2);

    // mover inimigos
    for (const e of this.activeEnemies) {
      if (!e.alive) continue;
      if (frozen) continue;
      if (wallActive && e.pathIndex === wallIdx) continue;
      const target = this.PATH[e.pathIndex];
      if (!target) continue;
      const dx = target.x - e.container.x, dy = target.y - e.container.y;
      const dist = Math.hypot(dx, dy);
      const step = e.speed * dt;
      if (step >= dist) {
        e.container.x = target.x; e.container.y = target.y;
        e.pathIndex++;
        if (e.pathIndex >= this.PATH.length) this.enemyReachedBase(e);
      } else {
        e.container.x += (dx/dist)*step;
        e.container.y += (dy/dist)*step;
      }
    }
    // remover gelo tint quando passar
    if (!frozen) for (const e of this.activeEnemies) if (e.alive && e.body.clearTint) e.body.clearTint();

    // torres atiram (escala com speed)
    for (const t of this.towers) {
      if (time - t.lastFire < t.def.fireRate / (this.state.speed * window.getActiveMult('fireRate', t.type))) continue;
      const target = this.findTarget(t);
      if (target) {
        this.fireProjectile(t, target);
        t.lastFire = time;
        t.container.setScale(1.08);
        t.pulseUntil = time + 70;
        // flash branco rápido no topo da torre
        const fp = t.flashPos || { x: 0, y: -16 };
        const flash = this.add.circle(t.x + fp.x, t.y + fp.y, 12, 0xffffff, 0.85);
        this.tweens.add({ targets: flash, alpha: 0, scale: 2, duration: 160, onComplete: () => flash.destroy() });
      }
    }

    // projéteis (sem tweens por frame — evita travamento)
    const pl = this.projectileLayer;
    for (const p of this.activeProjectiles) {
      if (!p.alive) continue;
      const tgt = p.target;
      if (!tgt || !tgt.alive || !tgt.container || !tgt.container.scene) {
        p.alive = false;
        continue;
      }
      const tx = tgt.container.x, ty = tgt.container.y;
      const dx = tx - p.x;
      const dy = ty - p.y;
      const d = Math.hypot(dx, dy) || 0.0001;
      const step = p.speed * dt;
      if (step >= d) {
        if (p.splash) {
          this.spawnSpark(tx, ty, p.color, 10);
          for (const e of this.activeEnemies) {
            if (!e.alive) continue;
            const dd = Math.hypot(e.container.x - tx, e.container.y - ty);
            if (dd <= p.splash) this.hitEnemy(e, p.damage);
          }
        } else {
          this.hitEnemy(tgt, p.damage);
        }
        p.alive = false;
      } else {
        p.x += (dx/d)*step;
        p.y += (dy/d)*step;
        const ang = Math.atan2(dy, dx);
        p.angle = (p.angle || 0) + (p.spin || 0) * dt;

        if (p.kind === 'archer') {
          // flecha: linha fina + ponta triangular amarela
          const sx = p.x - Math.cos(ang) * 14;
          const sy = p.y - Math.sin(ang) * 14;
          pl.lineStyle(2, 0x8a6a3a, 1);
          pl.beginPath(); pl.moveTo(sx, sy); pl.lineTo(p.x, p.y); pl.strokePath();
          // ponta
          const tipL = 8, tipW = 4;
          const bx = p.x - Math.cos(ang) * tipL;
          const by = p.y - Math.sin(ang) * tipL;
          const nx = -Math.sin(ang) * tipW;
          const ny =  Math.cos(ang) * tipW;
          pl.fillStyle(0xffe044, 1);
          pl.fillTriangle(p.x, p.y, bx+nx, by+ny, bx-nx, by-ny);
          // rastro verde fadeando
          pl.fillStyle(0x6cbf4c, 0.35);
          pl.fillCircle(sx, sy, 3);
          pl.fillStyle(0x6cbf4c, 0.18);
          pl.fillCircle(sx - Math.cos(ang)*6, sy - Math.sin(ang)*6, 4);

        } else if (p.kind === 'dwarf') {
          // rocha rotacionando
          const r = 6;
          pl.fillStyle(0x4a4a4a, 1).fillCircle(p.x, p.y, r);
          pl.lineStyle(1.5, 0x2a2a2a, 1).strokeCircle(p.x, p.y, r);
          // detalhes da rocha que giram
          const a1 = p.angle, a2 = p.angle + 2.1, a3 = p.angle + 4.2;
          pl.fillStyle(0x6a6a6a, 1);
          pl.fillCircle(p.x + Math.cos(a1)*2.5, p.y + Math.sin(a1)*2.5, 1.5);
          pl.fillCircle(p.x + Math.cos(a2)*2.5, p.y + Math.sin(a2)*2.5, 1.5);
          pl.fillCircle(p.x + Math.cos(a3)*2.5, p.y + Math.sin(a3)*2.5, 1.5);

        } else {
          // mago: orbe roxo com halo pulsante
          const pulse = 0.6 + Math.sin(time * 0.02) * 0.4;
          pl.fillStyle(0xc89cff, 0.25 * pulse).fillCircle(p.x, p.y, 12);
          pl.fillStyle(0xc89cff, 0.5).fillCircle(p.x, p.y, 8);
          pl.fillStyle(0xffffff, 0.9).fillCircle(p.x, p.y, 4);
          // trail de faíscas
          const tailX = p.x - (dx/d)*10;
          const tailY = p.y - (dy/d)*10;
          pl.fillStyle(0xc89cff, 0.4).fillCircle(tailX, tailY, 3);
          pl.fillStyle(0x9a5fbf, 0.25).fillCircle(tailX - (dx/d)*5, tailY - (dy/d)*5, 4);
        }
      }
    }
    this.activeProjectiles = this.activeProjectiles.filter(p => p.alive);
    this.activeEnemies = this.activeEnemies.filter(e => e.alive);

    for (const t of this.towers) {
      if (t.pulseUntil && time > t.pulseUntil && t.container && t.container.scaleX !== 1) t.container.setScale(1);
    }

    if (this.state.waveActive && this.state.enemiesAlive === 0
        && this.spawnTimer && this.spawnTimer.getOverallProgress() >= 1) {
      this.state.waveActive = false;
      this.state.gold += 25; // bônus de onda
      if (this.state.wave >= this.WAVES.length) {
        // Fase concluída
        const hasNextPhase = this.phaseId < this.stage.phases.length - 1;
        if (hasNextPhase) {
          // reporta progresso parcial e avança fase em sequência (sem recriar a cena)
          try {
            window.TD_POST && window.TD_POST({
              type: 'td:stageComplete',
              wave: this.state.wave | 0,
              gold: this.state.gold | 0,
              victory: true,
              stage: this.stage.name,
              phase: this.phase && this.phase.name,
              partial: true,
            });
          } catch (_) {}
          this.events.emit('stateUpdate', this.state);
          this.time.delayedCall(800, () => this.loadPhase(this.phaseId + 1));
        } else {
          // última fase: vitória total
          this.state.victory = true;
          this.events.emit('stateUpdate', this.state);
          this.exitToGameOver({ victory: true, wave: this.state.wave, stage: this.stage.name });
        }
      } else {
        this.events.emit('stateUpdate', this.state);
      }
    }
  }

  findTarget(tower) {
    let best = null, bestProg = -1;
    for (const e of this.activeEnemies) {
      if (!e.alive) continue;
      const d = Math.hypot(e.container.x - tower.x, e.container.y - tower.y);
      if (d <= tower.def.range * window.getActiveMult('range', tower.type) && e.pathIndex > bestProg) { best = e; bestProg = e.pathIndex; }
    }
    return best;
  }

  fireProjectile(tower, target) {
    const fp = tower.flashPos || { x: 0, y: -10 };
    const projectile = {
      x: tower.x + fp.x,
      y: tower.y + fp.y,
      target,
      damage: tower.def.damage * window.getActiveMult('damage', tower.type),
      speed: 540,
      radius: tower.type === 'archer' ? 4 : 6,
      alive: true,
      color: tower.def.projColor,
      splash: tower.def.splash ? tower.def.splash * window.getActiveMult('splash', tower.type) : tower.def.splash,
      kind: tower.type,
      angle: 0,
      spin: tower.type === 'dwarf' ? 12 : 0,
    };
    this.activeProjectiles.push(projectile);
  }


  hitEnemy(e, dmg) {
    if (!e.alive) return;
    e.hp -= dmg;
    const ratio = Math.max(0, e.hp / e.maxHp);
    if (e.drawHp) e.drawHp(ratio); else if (e.hpBar) e.hpBar.width = e.hpBarW * ratio;
    if (e.body.setFillStyle) {
      const orig = e.typeDef.color;
      e.body.setFillStyle(0xffffff);
      this.time.delayedCall(60, () => { if (e.alive && e.body.setFillStyle) e.body.setFillStyle(orig); });
    }
    if (e.hp <= 0) {
      e.alive = false;
      this.spawnSpark(e.container.x, e.container.y, e.typeDef.spark, 12);
      this.state.gold += Math.round(e.reward * window.getActiveMult('goldBonus', 'global'));
      this.state.enemiesAlive--;
      e.container.destroy();
      this.events.emit('stateUpdate', this.state);
    }
  }

  enemyReachedBase(e) {
    if (!e.alive) return;
    e.alive = false;
    this.state.enemiesAlive--;
    this.state.hp -= 1;
    e.container.destroy();
    this.cameras.main.flash(120, 80, 0, 0);
    this.events.emit('stateUpdate', this.state);
    if (this.state.hp <= 0) {
      this.state.gameOver = true;
      this.exitToGameOver({ victory: false, wave: this.state.wave, stage: this.stage.name });
    }
  }
}

class UIScene extends Phaser.Scene {

    this.stageId = this.gameScene ? this.gameScene.stage.id : 0;

    [this.hpText, this.goldText, this.waveText].forEach(t => t.setShadow(2,2,'#000000',3));
