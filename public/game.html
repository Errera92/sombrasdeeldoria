    this.title.setShadow(2,2,'#000000',4);
    this.updateStageTitle();

    // botão velocidade
    this.speedIcons = ['🐢','🐇','🚀'];
    this.speedVals = [1,2,3];
    this.speedIdx = 0;
    this.speedBtn = makeButton(this, W - 380, 28, 90, 40, "🐢 1×", {
      fill: 0x1a2a4a, stroke: 0x6c8cbf, hoverFill: 0x2d3a5a,
      fontSize: 16, fontColor: '#e0e8ff', radius: 12,
      onClick: () => {
        this.speedIdx = (this.speedIdx+1) % 3;
        this.speedBtn.btnLabel.setText(`${this.speedIcons[this.speedIdx]} ${this.speedVals[this.speedIdx]}×`);
        game.events.emit('setSpeed', this.speedVals[this.speedIdx]);
      }
    });

    // botão upgrades in-game
    this.upgradeBtn = makeButton(this, W - 380, 78, 100, 36, "⬆ Upgrades", {
      fill: 0x2a1a3a, stroke: 0xa080c8, hoverFill: 0x3a2a5a,
      fontSize: 13, fontColor: '#e8d8ff', radius: 10,
      onClick: () => this.toggleUpgradePanel()
    });

    // botão loja
    this.shopBtn = makeButton(this, W - 270, 28, 90, 40, "🛒 Loja", {
      fill: 0x3a1a08, stroke: 0xbf8c6c, hoverFill: 0x5a3a2d,
      fontSize: 14, fontColor: '#ffe0c0', radius: 12,
      onClick: () => this.toggleShop()
    });

    // iniciar onda
    this.startBtn = makeButton(this, W - 130, 28, 200, 40, "Iniciar Onda", {
      fill: 0x1d4a1a, stroke: 0x6cbf4c, hoverFill: 0x3d7a3a,
      fontSize: 18, fontColor: '#e8ffe0', radius: 12,
      onClick: () => game.events.emit('startWave')
    });


    // itens
    this.items = {
      fire:      { icon:'🔥', name:'Chuva de Fogo',     cost:150, cooldown:60000, until:0, desc:'Dano em área 3s' },
      ice:       { icon:'❄️', name:'Gelo Eterno',       cost:120, cooldown:45000, until:0, desc:'Congela todos 4s' },
      lightning: { icon:'⚡', name:'Relâmpago',          cost:200, cooldown:30000, until:0, desc:'Mata 5 mais fracos' },
      wall:      { icon:'🛡️', name:'Muralha Temp.',     cost:80,  cooldown:30000, until:0, desc:'Bloqueia caminho 6s' },
      gold:      { icon:'💰', name:'Bênção do Anão',    cost:50,  cooldown:90000, until:0, desc:'+100 ouro' },
    };
    this.shopOpen = false;
    this.upgradePanelOpen = false;
    this.buildShop();
    this.buildUpgradePanel();
    this.buildTowerPanel();

    this.towerSelHandler = (sel) => this.refreshTowerPanel(sel);
    game.events.on('stateUpdate', this.refreshHandler);
    game.events.on('towerSelectionChanged', this.towerSelHandler);
    this.menu = null;
  }

  shutdownUI() {
    if (this.gameScene && this.gameScene.events) {
      if (this.refreshHandler) this.gameScene.events.off('stateUpdate', this.refreshHandler);
      if (this.towerSelHandler) this.gameScene.events.off('towerSelectionChanged', this.towerSelHandler);
    }
    this.closeMenu();
    this.tweens.killAll();
    this.time.removeAllEvents();
    this.gameScene = null;
    this.refreshHandler = null;
    this.towerSelHandler = null;
    this.towerRows = null;
  }


  buildShop() {
    this.shop = this.add.container(W, 80).setVisible(false);
    const w = 240, h = 540;
    const panelG = this.add.graphics();
    panelG.fillStyle(0x14181a, 0.96).fillRoundedRect(0, 0, w, h, 14);
    panelG.lineStyle(2, 0xc9a84c, 0.8).strokeRoundedRect(0, 0, w, h, 14);
    const title = this.add.text(w/2, 12, "Loja Mística", {
      fontSize:'20px', color:'#f0d8ff', fontFamily: FONT_TITLE, fontStyle:'bold'
    }).setOrigin(0.5,0);
    title.setShadow(2,2,'#000000',4);
    this.shop.add([panelG, title]);

    this.shopRows = {};
    Object.entries(this.items).forEach(([key, it], i) => {
      const yy = 48 + i*96;
      const rowW = w-16, rowH = 88;
      const rg = this.add.graphics();
      const drawRow = (fill, stroke) => {
        rg.clear();
        rg.fillStyle(fill, 0.95).fillRoundedRect(8, yy, rowW, rowH, 12);
        rg.lineStyle(1.5, stroke, 0.9).strokeRoundedRect(8, yy, rowW, rowH, 12);
      };
      drawRow(0x2a2418, 0xc9a84c);
      const ico = this.add.text(22, yy+12, it.icon, {fontSize:'30px'});
      const name = this.add.text(68, yy+10, it.name, {fontSize:'15px', color:'#f0e0c0', fontFamily: FONT_BTN, fontStyle:'bold'});
      const desc = this.add.text(68, yy+30, it.desc, {fontSize:'11px', color:'#a8a08c', fontFamily: FONT_BTN});
      const cost = this.add.text(68, yy+48, `Custo: ${it.cost}`, {fontSize:'12px', color:'#ffcc44', fontFamily: FONT_BTN, fontStyle:'bold'});
      const cdTxt = this.add.text(68, yy+64, '', {fontSize:'12px', color:'#ff8888', fontFamily: FONT_BTN});
      [name, cost].forEach(t=>t.setShadow(1,1,'#000',2));
      const overlayG = this.add.graphics().setVisible(false);
      overlayG.fillStyle(0x000000, 0.55).fillRoundedRect(8, yy, rowW, rowH, 12);
      this.shop.add([rg, ico, name, desc, cost, cdTxt, overlayG]);

      const hit = this.add.zone(8, yy, rowW, rowH).setOrigin(0).setInteractive({useHandCursor:true});
      hit.on('pointerover', () => drawRow(0x3d3424, 0xffe88a));
      hit.on('pointerout',  () => drawRow(0x2a2418, 0xc9a84c));
      hit.on('pointerdown', () => {
        this.tweens.add({ targets: [rg, ico, name, desc, cost, cdTxt], scale: 0.97, duration: 70, yoyo: true });
        this.scene.get('GameScene').events.emit('useItem', key);
      });
      this.shop.add(hit);
      this.shopRows[key] = { cdTxt, overlay: overlayG };
    });
  }


  toggleShop() {
    this.shopOpen = !this.shopOpen;
    this.shop.setVisible(this.shopOpen);
    this.tweens.add({ targets: this.shop, x: this.shopOpen ? W-240 : W, duration: 200 });
  }

  update(time) {
    if (!this.shopOpen) return;
    Object.entries(this.items).forEach(([key, it]) => {
      const row = this.shopRows[key];
      const remain = it.until - this.scene.get('GameScene').time.now;
      if (remain > 0) {
        row.cdTxt.setText(`Recarga: ${(remain/1000).toFixed(1)}s`);
        row.overlay.setVisible(true);
      } else {
        row.cdTxt.setText('');
        row.overlay.setVisible(false);
      }
    });
  }

  refresh(s) {
    this.hpText.setText(`HP: ${s.hp}`);
    this.goldText.setText(`Ouro: ${s.gold}`);
    const phaseStr = s.totalPhases ? `  ·  Fase: ${s.phase}/${s.totalPhases}` : '';
    this.waveText.setText(`Onda: ${s.wave} / ${s.totalWaves}${phaseStr}`);
    this.startBtn.setAlpha(s.waveActive ? 0.4 : 1);
    this.refreshTowerPanel();
    this.refreshUpgradePanel();
  }

  // =========== UPGRADES IN-GAME ===========
  buildUpgradePanel() {
    const w = 260, h = H - 80;
    this.upgradePanel = this.add.container(W, 70).setVisible(false).setDepth(50);
    const bg = this.add.graphics();
    bg.fillStyle(0x14181a, 0.96).fillRoundedRect(0, 0, w, h, 14);
    bg.lineStyle(2, 0xa080c8, 0.8).strokeRoundedRect(0, 0, w, h, 14);
    const title = this.add.text(w/2, 10, "⬆ Upgrades Ativos", {
      fontSize:'18px', color:'#e8d8ff', fontFamily: FONT_TITLE, fontStyle:'bold'
    }).setOrigin(0.5,0);
    title.setShadow(2,2,'#000',4);
    this.upgradePanel.add([bg, title]);
    this.upgradePanelW = w;
    this.upgradePanelH = h;
    this.upgradePanelContent = this.add.container(0, 40);
    this.upgradePanel.add(this.upgradePanelContent);
    this.refreshUpgradePanel();
  }

  toggleUpgradePanel() {
    if (!this.upgradePanel) return;
    this.upgradePanelOpen = !this.upgradePanelOpen;
    this.upgradePanel.setVisible(true);
    this.tweens.add({
      targets: this.upgradePanel,
      x: this.upgradePanelOpen ? W - this.upgradePanelW - 10 : W,
      duration: 200,
      onComplete: () => { if (!this.upgradePanelOpen) this.upgradePanel.setVisible(false); }
    });
    if (this.upgradePanelOpen) this.refreshUpgradePanel();
  }

  refreshUpgradePanel() {
    if (!this.upgradePanelContent) return;
    this.upgradePanelContent.removeAll(true);

    const owned = window.TD_TOWER_UPGRADES || {};
    const active = window.TD_ACTIVE_UPGRADES || {};
    const gold = (this.gameScene && this.gameScene.state) ? this.gameScene.state.gold : 0;

    const sections = [
      { key: 'archer', label: '🏹 Arqueiro', color: '#9cffb0' },
      { key: 'dwarf',  label: '⛏ Anão',     color: '#e8c87a' },
      { key: 'mage',   label: '🔮 Mago',    color: '#e8a8ff' },
      { key: 'global', label: '🌍 Global',  color: '#ffd966' },
    ];

    let y = 0;
    const w = this.upgradePanelW;

    sections.forEach(section => {
      const ids = Object.keys(UPGRADE_DEFS).filter(id =>
        UPGRADE_DEFS[id].tower === section.key && (owned[id] | 0) > 0
      );
      if (ids.length === 0) return;

      const header = this.add.text(12, y, section.label, {
        fontSize: '13px', color: section.color, fontFamily: FONT_BTN, fontStyle: 'bold'
      });
      header.setShadow(1,1,'#000',2);
      this.upgradePanelContent.add(header);
      y += 20;

      ids.forEach(id => {
        const def = UPGRADE_DEFS[id];
        const lvl = owned[id] | 0;
        const cost = UPGRADE_ACTIVATION_COST[id] || 0;
        const isActive = !!active[id];
        const isPreOnly = id === 'starting_gold';

        const rowG = this.add.graphics();
        const rowW = w - 16, rowH = 48;
        let fill = 0x2a2418, stroke = 0x6a5a36;
        if (isActive) { fill = 0x1d4a1a; stroke = 0x6cbf4c; }
        else if (isPreOnly) { fill = 0x222226; stroke = 0x444448; }
        rowG.fillStyle(fill, 0.95).fillRoundedRect(8, y, rowW, rowH, 8);
        rowG.lineStyle(1.5, stroke, 0.9).strokeRoundedRect(8, y, rowW, rowH, 8);

        const ico = this.add.text(18, y + 6, def.icon, { fontSize: '22px' });
        const name = this.add.text(50, y + 4, def.name, {
          fontSize: '12px', color: '#f0e0c0', fontFamily: FONT_BTN, fontStyle: 'bold'
        });
        const sub = this.add.text(50, y + 20, `Nível ${lvl}  ·  🪙 ${cost}`, {
          fontSize: '11px', color: '#cfc09a', fontFamily: FONT_BTN
        });
        [name, sub].forEach(t => t.setShadow(1,1,'#000',2));
        this.upgradePanelContent.add([rowG, ico, name, sub]);

        if (isPreOnly) {
          const tag = this.add.text(w - 18, y + rowH/2, 'Pré-partida', {
            fontSize: '11px', color: '#a8a8b0', fontFamily: FONT_BTN, fontStyle: 'italic'
          }).setOrigin(1, 0.5);
          this.upgradePanelContent.add(tag);
        } else if (isActive) {
          const tag = this.add.text(w - 18, y + rowH/2, '✔ Ativo', {
            fontSize: '12px', color: '#9cffb0', fontFamily: FONT_BTN, fontStyle: 'bold'
          }).setOrigin(1, 0.5);
          tag.setShadow(1,1,'#000',2);
          this.upgradePanelContent.add(tag);
        } else {
          const canAfford = gold >= cost;
          const btnG = this.add.graphics();
          const bw = 62, bh = 28, bx = w - bw - 14, by = y + (rowH - bh) / 2;
          const btnFill = canAfford ? 0x8a6a14 : 0x3a3428;
          const btnStroke = canAfford ? 0xffd966 : 0x5a5440;
          btnG.fillStyle(btnFill, 1).fillRoundedRect(bx, by, bw, bh, 8);
          btnG.lineStyle(1.5, btnStroke, 1).strokeRoundedRect(bx, by, bw, bh, 8);
          const btnTxt = this.add.text(bx + bw/2, by + bh/2, 'Ativar', {
            fontSize: '12px', color: canAfford ? '#fff8d8' : '#888070', fontFamily: FONT_BTN, fontStyle: 'bold'
          }).setOrigin(0.5);
          this.upgradePanelContent.add([btnG, btnTxt]);
          if (canAfford) {
            const hit = this.add.zone(bx, by, bw, bh).setOrigin(0).setInteractive({ useHandCursor: true });
            hit.on('pointerdown', () => this.activateUpgrade(id));
            this.upgradePanelContent.add(hit);
          }
        }
        y += rowH + 6;
      });
      y += 6;
    });

    if (y === 0) {
      const empty = this.add.text(this.upgradePanelW/2, 30,
        'Compre upgrades na Loja\npara ativá-los em jogo.',
        { fontSize:'12px', color:'#a8a08c', fontFamily: FONT_BTN, fontStyle:'italic', align:'center' }
      ).setOrigin(0.5, 0);
      this.upgradePanelContent.add(empty);
    }
  }

  activateUpgrade(id) {
    const def = UPGRADE_DEFS[id];
    if (!def || !this.gameScene) return;
    if (id === 'starting_gold') return;
    const cost = UPGRADE_ACTIVATION_COST[id] || 0;
    const g = this.gameScene;
    if (g.state.gold < cost) return;
    if (window.TD_ACTIVE_UPGRADES[id]) return;
    g.state.gold -= cost;
    window.TD_ACTIVE_UPGRADES[id] = true;
    g.events.emit('stateUpdate', g.state);
    this.showFloatingText(`+${def.name} ATIVO!`);
    this.showUpgradeBadgeOnTowers(def.tower);
    this.refreshUpgradePanel();
  }

  showFloatingText(text) {
    const t = this.add.text(W/2, H/2, text, {
      fontSize: '28px', color: '#ffd966', fontFamily: FONT_TITLE, fontStyle: 'bold'
    }).setOrigin(0.5).setDepth(80);
    t.setShadow(0, 0, '#ffae00', 18, true, true);
    if (!this._floatTexts) this._floatTexts = [];
    this._floatTexts.push(t);
    this.tweens.add({
      targets: t, y: H/2 - 80, alpha: 0, duration: 1500, ease: 'Cubic.Out',
      onComplete: () => {
        if (t && t.scene) t.destroy();
        if (this._floatTexts) this._floatTexts = this._floatTexts.filter(x => x !== t);
      }
    });
  }

  showUpgradeBadgeOnTowers(towerKey) {
    if (!this.gameScene) return;
    const iconMap = { archer: '🏹', dwarf: '🔨', mage: '🔮', global: '💰' };
    const icon = iconMap[towerKey] || '✨';
    const towers = this.gameScene.towers || [];
    const targets = towerKey === 'global' ? towers : towers.filter(t => t.type === towerKey);
    if (!this._badgeTexts) this._badgeTexts = [];
    targets.forEach(t => {
      const badge = this.gameScene.add.text(t.x, t.y - 36, icon, { fontSize: '20px' })
        .setOrigin(0.5).setDepth(70);
      this._badgeTexts.push(badge);
      const tw = this.gameScene.tweens.add({
        targets: badge, alpha: { from: 1, to: 0.3 }, yoyo: true, repeat: 5, duration: 180,
        onComplete: () => {
          if (badge && badge.scene) badge.destroy();
          if (this._badgeTexts) this._badgeTexts = this._badgeTexts.filter(x => x !== badge);
        }
      });
    });
  }



  buildTowerPanel() {
    const panelW = 72;
    const icons = { archer: '🏹', dwarf: '⛏️', mage: '🔮' };
    const shortName = { archer: 'Arqueiro', dwarf: 'Anão', mage: 'Mago' };
    this.towerPanel = this.add.container(0, 0).setDepth(40);
    const bg = this.add.graphics();
    bg.fillStyle(0x14181a, 0.92).fillRect(0, 0, panelW, H);
    bg.lineStyle(2, 0xc9a84c, 0.7);
    bg.beginPath(); bg.moveTo(panelW, 0); bg.lineTo(panelW, H); bg.strokePath();
    this.towerPanel.add(bg);

    this.towerRows = {};
    const items = Object.entries(TOWER_TYPES);
    const startY = 70;
    const itemH = 88;
    items.forEach(([key, def], i) => {
      const yy = startY + i * itemH;
      const cell = this.add.container(panelW / 2, yy + itemH / 2);
      const frame = this.add.graphics();
      const drawFrame = (selected) => {
        frame.clear();
        const stroke = selected ? 0xffd700 : 0x6a5a36;
        frame.fillStyle(0x2a2418, 0.95).fillRoundedRect(-30, -38, 60, 76, 10);
        frame.lineStyle(selected ? 3 : 1.5, stroke, selected ? 1 : 0.9).strokeRoundedRect(-30, -38, 60, 76, 10);
      };
      drawFrame(false);
      const swatch = this.add.graphics();
      swatch.fillStyle(def.color, 1).fillRoundedRect(-16, -32, 32, 22, 4);
      swatch.lineStyle(1, 0x000000, 1).strokeRoundedRect(-16, -32, 32, 22, 4);
      const icon = this.add.text(0, -21, icons[key] || '⚔️', { fontSize: '16px' }).setOrigin(0.5);
      const name = this.add.text(0, 4, shortName[key] || def.name, {
        fontSize: '11px', color: '#f0e0c0', fontFamily: FONT_BTN, fontStyle: 'bold'
      }).setOrigin(0.5);
      const cost = this.add.text(0, 22, `🪙${def.cost}`, {
        fontSize: '12px', color: '#ffcc44', fontFamily: FONT_BTN, fontStyle: 'bold'
      }).setOrigin(0.5);
      [name, cost].forEach(t => t.setShadow(1, 1, '#000', 2));
      cell.add([frame, swatch, icon, name, cost]);
      cell.setSize(60, 76).setInteractive({ useHandCursor: true });
      cell.on('pointerdown', () => {
        if (this.gameScene) this.gameScene.setSelectedTowerType(key);
      });
      this.towerPanel.add(cell);
      this.towerRows[key] = { cell, frame, cost, drawFrame, def };
    });
    this.refreshTowerPanel();
  }

  refreshTowerPanel(selOverride) {
    if (!this.towerRows) return;
    const sel = selOverride !== undefined
      ? selOverride
      : (this.gameScene ? this.gameScene.selectedTowerType : null);
    const gold = (this.gameScene && this.gameScene.state) ? this.gameScene.state.gold : 0;
    Object.entries(this.towerRows).forEach(([key, row]) => {
      const canAfford = gold >= row.def.cost;
      row.drawFrame(sel === key);
      row.cell.setAlpha(canAfford ? 1 : 0.45);
      row.cost.setColor(canAfford ? '#ffcc44' : '#aa6666');
    });
  }


  updateStageTitle() {
    if (!this.title) return;
    const stage = STAGES[this.stageId];
    const phaseName = this.gameScene && this.gameScene.phase ? this.gameScene.phase.name : '';
    const phaseNum = this.gameScene && typeof this.gameScene.phaseId === 'number'
      ? ` (${this.gameScene.phaseId + 1}/${stage.phases.length})` : '';
    const str = phaseName
      ? `${stage.icon} ${stage.name} — ${phaseName}${phaseNum}`
      : `${stage.icon} ${stage.name}`;
    this.title.setText(str);
  }

  showBuildMenu(x, y, onPick) {
    this.closeMenu();
    const game = this.scene.get('GameScene');
    const types = Object.entries(TOWER_TYPES);
    const w = 240, lineH = 64, h = 36 + types.length * lineH;
    let mx = x + 40, my = y - h/2;
    if (mx + w > W) mx = x - 40 - w;
    if (my < 60) my = 60;
    if (my + h > H) my = H - h - 10;

    const c = this.add.container(mx, my);
    const panelG = this.add.graphics();
    panelG.fillStyle(0x14181a, 0.96).fillRoundedRect(0, 0, w, h, 14);
    panelG.lineStyle(2, 0xc9a84c, 0.9).strokeRoundedRect(0, 0, w, h, 14);
    const title = this.add.text(w/2, 10, "Construir Torre", {
      fontSize:'16px', color:'#f0d8a8', fontFamily: FONT_TITLE, fontStyle:'bold'
    }).setOrigin(0.5,0);
    title.setShadow(2,2,'#000',3);
    c.add([panelG, title]);

    types.forEach(([key, def], i) => {
      const yy = 34 + i*lineH;
      const rowW = w-8, rowH = lineH-6;
      const rg = this.add.graphics();
      const drawRow = (fill, stroke) => {
        rg.clear();
        rg.fillStyle(fill, 0.92).fillRoundedRect(4, yy, rowW, rowH, 10);
        rg.lineStyle(1.5, stroke, 0.9).strokeRoundedRect(4, yy, rowW, rowH, 10);
      };
      const canAfford = game.state.gold >= def.cost;
      drawRow(0x2a2418, canAfford ? 0xc9a84c : 0x6a5a36);
      const swatchG = this.add.graphics();
      swatchG.fillStyle(def.color, 1).fillRoundedRect(14, yy + rowH/2 - 13, 20, 26, 4);
      swatchG.lineStyle(1, 0x000, 1).strokeRoundedRect(14, yy + rowH/2 - 13, 20, 26, 4);
      const name = this.add.text(44, yy + 6, def.name, {fontSize:'14px', color:'#f0e0c0', fontFamily: FONT_BTN, fontStyle:'bold'});
      const cost = this.add.text(44, yy + 24, `Custo: ${def.cost}`, {fontSize:'12px', color: canAfford ? '#ffcc44' : '#aa6666', fontFamily: FONT_BTN, fontStyle:'bold'});
      const desc = this.add.text(44, yy + 40, def.desc, {fontSize:'11px', color:'#a8a08c', fontFamily: FONT_BTN});
      [name, cost].forEach(t=>t.setShadow(1,1,'#000',2));
      c.add([rg, swatchG, name, cost, desc]);

      const hit = this.add.zone(4, yy, rowW, rowH).setOrigin(0).setInteractive({useHandCursor: true});
      hit.on('pointerover', () => drawRow(0x3d3424, 0xffe88a));
      hit.on('pointerout',  () => drawRow(0x2a2418, canAfford ? 0xc9a84c : 0x6a5a36));
      hit.on('pointerdown', () => { if (!canAfford) return; onPick(key); this.closeMenu(); });
      c.add(hit);
    });

    this.menu = c;
    this.menuBlocker = this.add.rectangle(0,0,W,H, 0x000, 0.0001).setOrigin(0).setInteractive();
    this.menuBlocker.on('pointerdown', () => this.closeMenu());
    this.children.bringToTop(c);
  }

  closeMenu() {
    if (this.menu) { this.menu.destroy(); this.menu = null; }
    if (this.menuBlocker) { this.menuBlocker.destroy(); this.menuBlocker = null; }
  }
}

// =================== GAME OVER ===================
class GameOverScene extends Phaser.Scene {
  constructor() { super('GameOverScene'); }
  create(data) {
    // fundo escurecido com vinheta
    this.add.rectangle(W/2, H/2, W, H, 0x000000, 0.78);
    const vignette = this.add.graphics();
    vignette.fillStyle(data.victory ? 0x1a3d2a : 0x3d1a1a, 0.35);
    vignette.fillCircle(W/2, H/2, 400);

    const title = data.victory ? "VITÓRIA!" : "DERROTA";
    const color = data.victory ? '#9cffb0' : '#ff8a8a';
    const glowColor = data.victory ? '#44ff88' : '#ff4444';
    const tt = this.add.text(W/2, H/2 - 80, title, {
      fontSize:'80px', color, fontFamily: FONT_TITLE, fontStyle:'bold'
    }).setOrigin(0.5);
    tt.setShadow(0, 0, glowColor, 20, true, true);
    this.tweens.add({ targets: tt, scale: 1.05, yoyo: true, repeat: -1, duration: 1200, ease: 'Sine.inOut' });

    const phaseLabel = data.phaseName ? ` — ${data.phaseName}` : '';
    const sub = this.add.text(W/2, H/2 - 10,
      data.victory ? `${data.stage}${phaseLabel} foi conquistada.` : `As trevas tomaram ${data.stage}${phaseLabel} na onda ${data.wave}.`,
      { fontSize:'20px', color:'#e8dfc0', fontFamily: FONT_TITLE, fontStyle:'italic', align:'center', wordWrap:{width:W-80} }
    ).setOrigin(0.5);
    sub.setShadow(2,2,'#000',4);

    const stageId = data.stageId | 0;
    const phaseId = data.phaseId | 0;
    const hasNext = !!data.hasNext && data.victory;

    const goSelect = () => {
      this.scene.stop('GameOverScene'); this.scene.stop('UIScene'); this.scene.stop('GameScene');
      this.scene.start('PhaseSelectScene', { stageId });
    };
    const replay = () => {
      this.scene.stop('GameOverScene'); this.scene.stop('UIScene'); this.scene.stop('GameScene');
      this.scene.start('GameScene', { stageId, phaseId });
    };
    const nextPhase = () => {
      this.scene.stop('GameOverScene'); this.scene.stop('UIScene'); this.scene.stop('GameScene');
      this.scene.start('GameScene', { stageId, phaseId: phaseId + 1 });
    };

    if (hasNext) {
      makeButton(this, W/2 - 230, H/2 + 100, 200, 48, "← Fases", {
        fill: 0x1d4a1a, stroke: 0xc9a84c, hoverFill: 0x3d7a3a,
        fontSize: 15, fontColor: '#e8ffe0', onClick: goSelect
      });
      makeButton(this, W/2, H/2 + 100, 200, 48, "Jogar Novamente", {
        fill: 0x3a1a6e, stroke: 0xffd700, hoverFill: 0x5a2aae,
        fontSize: 15, fontColor: '#ffe8a8', onClick: replay
      });
      makeButton(this, W/2 + 230, H/2 + 100, 200, 48, "Próxima Fase →", {
        fill: 0x6e3a1a, stroke: 0xffe088, hoverFill: 0xae5a2a,
        fontSize: 15, fontColor: '#ffeac0', onClick: nextPhase
      });
    } else {
      makeButton(this, W/2 - 130, H/2 + 100, 220, 50, "Selecionar Fase", {
        fill: 0x1d4a1a, stroke: 0xc9a84c, hoverFill: 0x3d7a3a,
        fontSize: 17, fontColor: '#e8ffe0', onClick: goSelect
      });
      makeButton(this, W/2 + 130, H/2 + 100, 220, 50, "Jogar Novamente", {
        fill: 0x3a1a6e, stroke: 0xffd700, hoverFill: 0x5a2aae,
        fontSize: 17, fontColor: '#ffe8a8', onClick: replay
      });
    }
  }

}
